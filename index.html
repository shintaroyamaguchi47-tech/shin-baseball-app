<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="配球スコア">
  <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/26be.png">
  <title>配球スコアアプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { -webkit-touch-callout: none; overscroll-behavior-y: none; user-select: none; }
    ::-webkit-scrollbar { display: none; }
    .grid-bg { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
    input:focus { background-color: white !important; }
  </style>
</head>
<body class="bg-slate-100 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    function App() {
      // --- 1. ステート管理 ---
      
      const [gameState, setGameState] = useState(() => {
        const saved = localStorage.getItem('baseball_gameState');
        const initial = {
          inning: 1, isTop: true, outs: 0, balls: 0, strikes: 0, 
          batterTop: 1, batterBottom: 1,
          runs: { top: [0,0,0,0,0,0,0,0,0], bottom: [0,0,0,0,0,0,0,0,0] }
        };
        if (!saved) return initial;
        const parsed = JSON.parse(saved);
        if (parsed.batter && !parsed.batterTop) {
          parsed.batterTop = parsed.batter;
          parsed.batterBottom = 1;
        }
        return parsed;
      });

      const [gameInfo, setGameInfo] = useState(() => {
        const saved = localStorage.getItem('baseball_gameInfo');
        return saved ? JSON.parse(saved) : { date: new Date().toISOString().split('T')[0], teamTop: '先攻チーム', teamBottom: '後攻チーム' };
      });

      const [lineups, setLineups] = useState(() => {
        const saved = localStorage.getItem('baseball_lineups');
        return saved ? JSON.parse(saved) : {
          top: Array.from({length: 9}, (_,i)=>({ order: i+1, name: `先攻${i+1}番`, pos: i===0?'投':'未', throws: '右', bats: '右' })),
          bottom: Array.from({length: 9}, (_,i)=>({ order: i+1, name: `後攻${i+1}番`, pos: i===0?'投':'未', throws: '右', bats: '右' }))
        };
      });

      const [pitches, setPitches] = useState(() => {
        const saved = localStorage.getItem('baseball_pitches');
        return saved ? JSON.parse(saved) : [];
      });

      const [undoStack, setUndoStack] = useState(() => {
        const saved = localStorage.getItem('baseball_undoStack');
        return saved ? JSON.parse(saved) : [];
      });
      const [redoStack, setRedoStack] = useState(() => {
        const saved = localStorage.getItem('baseball_redoStack');
        return saved ? JSON.parse(saved) : [];
      });

      const [showSettings, setShowSettings] = useState(false);
      const [showExport, setShowExport] = useState(false);
      const [showInPlayResult, setShowInPlayResult] = useState(false);
      
      const [selectedPosition, setSelectedPosition] = useState(null);
      const [analysisFilter, setAnalysisFilter] = useState({ pitcher: 'ALL', batterSide: 'ALL' });
      const [currentPitch, setCurrentPitch] = useState({ course: null, type: 'ストレート系' });

      // --- 2. 永続化 ---
      useEffect(() => {
        localStorage.setItem('baseball_gameState', JSON.stringify(gameState));
        localStorage.setItem('baseball_gameInfo', JSON.stringify(gameInfo));
        localStorage.setItem('baseball_lineups', JSON.stringify(lineups));
        localStorage.setItem('baseball_pitches', JSON.stringify(pitches));
        localStorage.setItem('baseball_undoStack', JSON.stringify(undoStack));
        localStorage.setItem('baseball_redoStack', JSON.stringify(redoStack));
      }, [gameState, gameInfo, lineups, pitches, undoStack, redoStack]);

      // --- 3. 履歴管理ロジック ---
      const createSnapshot = () => ({
        gameState: JSON.parse(JSON.stringify(gameState)),
        lineups: JSON.parse(JSON.stringify(lineups)),
        pitches: [...pitches],
        showInPlayResult,
        selectedPosition
      });

      const recordAction = () => {
        const snapshot = createSnapshot();
        setUndoStack(prev => [...prev, snapshot].slice(-100));
        setRedoStack([]); 
      };

      const handleUndo = () => {
        if (undoStack.length === 0) return;
        const currentSnapshot = createSnapshot();
        setRedoStack(prev => [...prev, currentSnapshot]);
        const last = undoStack[undoStack.length - 1];
        setGameState(last.gameState);
        setLineups(last.lineups);
        setPitches(last.pitches);
        setShowInPlayResult(last.showInPlayResult);
        setSelectedPosition(last.selectedPosition);
        setUndoStack(prev => prev.slice(0, -1));
      };

      const handleRedo = () => {
        if (redoStack.length === 0) return;
        const currentSnapshot = createSnapshot();
        setUndoStack(prev => [...prev, currentSnapshot]);
        const next = redoStack[redoStack.length - 1];
        setGameState(next.gameState);
        setLineups(next.lineups);
        setPitches(next.pitches);
        setShowInPlayResult(next.showInPlayResult);
        setSelectedPosition(next.selectedPosition);
        setRedoStack(prev => prev.slice(0, -1));
      };

      // --- 4. 試合進行ロジック ---
      const handleNewGame = () => {
        if (window.confirm("データを全消去して新試合を開始しますか？")) {
          localStorage.clear();
          window.location.reload();
        }
      };

      const nextBatter = (outCount = 0) => {
        setGameState(prev => {
          let newOuts = prev.outs + outCount;
          let newInning = prev.inning;
          let newIsTop = prev.isTop;
          let newBatterTop = prev.batterTop;
          let newBatterBottom = prev.batterBottom;

          if (prev.isTop) {
            newBatterTop = newBatterTop === 9 ? 1 : newBatterTop + 1;
          } else {
            newBatterBottom = newBatterBottom === 9 ? 1 : newBatterBottom + 1;
          }

          if (newOuts >= 3) {
            newOuts = 0;
            if (prev.isTop) newIsTop = false;
            else { newIsTop = true; newInning++; }
          }
          return { ...prev, outs: newOuts, balls: 0, strikes: 0, batterTop: newBatterTop, batterBottom: newBatterBottom, inning: newInning, isTop: newIsTop };
        });
        setShowInPlayResult(false);
        setSelectedPosition(null);
      };

      const recordPitch = (result, detailedResult = '') => {
        if (result !== '牽制' && result !== '盗塁死' && result !== 'その他出塁' && currentPitch.course === null) {
          alert("コースを選択してください！");
          return;
        }
        recordAction(); 

        const defTeamKey = gameState.isTop ? 'bottom' : 'top';
        const offTeamKey = gameState.isTop ? 'top' : 'bottom';
        const currentBatterIndex = (gameState.isTop ? gameState.batterTop : gameState.batterBottom) - 1;
        
        const currentPitcherObj = lineups[defTeamKey].find(p => p.pos === '投' || p.pos === '1' || p.pos === '①') || { name: '投手未設定', throws: '右' };
        const currentBatterObj = lineups[offTeamKey][currentBatterIndex] || { name: '打者未設定', bats: '右' };

        const newPitch = {
          ...currentPitch,
          course: (result === '牽制' || result === '盗塁死' || result === 'その他出塁') ? null : currentPitch.course,
          type: (result === '牽制' || result === '盗塁死' || result === 'その他出塁') ? '-' : currentPitch.type,
          result: detailedResult || result,
          inning: gameState.inning,
          isTop: gameState.isTop,
          batter: currentBatterIndex + 1,
          pitchNumber: pitches.filter(p => p.inning === gameState.inning && p.isTop === gameState.isTop && p.batter === currentBatterIndex + 1).length + 1,
          pitcherName: currentPitcherObj.name,
          pitcherThrows: currentPitcherObj.throws,
          batterName: currentBatterObj.name,
          batterBats: currentBatterObj.bats
        };

        setPitches([...pitches, newPitch]);

        if (result === '盗塁死') {
          if (gameState.outs === 2) {
            setGameState(prev => {
              let nextIsTop = !prev.isTop;
              let nextInning = !prev.isTop ? prev.inning + 1 : prev.inning;
              return { ...prev, outs: 0, balls: 0, strikes: 0, isTop: nextIsTop, inning: nextInning };
            });
          } else {
            setGameState(prev => ({ ...prev, outs: prev.outs + 1 }));
          }
          setCurrentPitch(p => ({ ...p, course: null }));
          return;
        }

        if (result === '牽制') { setCurrentPitch(p => ({ ...p, course: null })); return; }

        if (result === 'ストライク' || result === '空振り') {
          if (gameState.strikes === 2) nextBatter(1);
          else setGameState(prev => ({ ...prev, strikes: prev.strikes + 1 }));
        } else if (result === 'ファウル') {
          if (gameState.strikes < 2) setGameState(prev => ({ ...prev, strikes: prev.strikes + 1 }));
        } else if (result === 'ボール') {
          if (gameState.balls === 3) nextBatter(0);
          else setGameState(prev => ({ ...prev, balls: prev.balls + 1 }));
        } else if (result === '死球' || result === 'その他出塁') {
          nextBatter(0); // 死球や打撃妨害などは無条件で次の打者へ
        } else if (result === 'インプレー') {
          setShowInPlayResult(true);
        }
        setCurrentPitch(p => ({ ...p, course: null }));
      };

      const handleInPlayFinalResult = (typeLabel, outCount) => {
        recordAction();
        const fullResult = `${selectedPosition}${typeLabel}`;
        setPitches(prev => {
          const newPitches = [...prev];
          if (newPitches.length > 0) {
            newPitches[newPitches.length - 1].result = fullResult;
          }
          return newPitches;
        });
        if (typeLabel === '本塁打') {
          setGameState(prev => {
            const team = prev.isTop ? 'top' : 'bottom';
            const newRuns = [...prev.runs[team]];
            newRuns[prev.inning - 1]++;
            return { ...prev, runs: { ...prev.runs, [team]: newRuns } };
          });
        }
        nextBatter(outCount);
      };

      const changeScore = (team, delta) => {
        recordAction();
        setGameState(prev => {
          const newRuns = [...prev.runs[team]];
          newRuns[prev.inning - 1] = Math.max(0, newRuns[prev.inning - 1] + delta);
          return { ...prev, runs: { ...prev.runs, [team]: newRuns } };
        });
      };

      // 手動で打順を変更する機能
      const manuallyChangeBatter = (newBatterNum) => {
        recordAction();
        setGameState(prev => ({
          ...prev,
          ...(prev.isTop ? { batterTop: newBatterNum } : { batterBottom: newBatterNum })
        }));
      };

      // --- 5. 導出データ ---
      const offTeamKey = gameState.isTop ? 'top' : 'bottom';
      const defTeamKey = gameState.isTop ? 'bottom' : 'top';
      const currentBatterIndex = (gameState.isTop ? gameState.batterTop : gameState.batterBottom) - 1;
      const currentBatterObj = lineups[offTeamKey][currentBatterIndex] || { name: '打者未設定', bats: '右' };
      const currentPitcherIdx = lineups[defTeamKey].findIndex(p => p.pos === '投' || p.pos === '1' || p.pos === '①');
      const currentPitcherObj = currentPitcherIdx !== -1 ? lineups[defTeamKey][currentPitcherIdx] : { name: '投手未設定', throws: '右' };

      const analysisData = useMemo(() => {
        const valid = pitches.filter(p => {
          if (p.result === '牽制' || p.result === '盗塁死' || p.result === 'その他出塁') return false;
          if (analysisFilter.pitcher !== 'ALL' && p.pitcherName !== analysisFilter.pitcher) return false;
          if (analysisFilter.batterSide !== 'ALL' && p.batterBats !== analysisFilter.batterSide) return false;
          return true;
        });
        const courseHeat = {}; let maxFreq = 0;
        valid.forEach(p => { if (p.course !== null) { courseHeat[p.course] = (courseHeat[p.course] || 0) + 1; if (courseHeat[p.course] > maxFreq) maxFreq = courseHeat[p.course]; } });
        const typeCount = {}; valid.forEach(p => typeCount[p.type] = (typeCount[p.type] || 0) + 1);
        const strikeRate = valid.length === 0 ? 0 : Math.round((valid.filter(p => p.result !== 'ボール').length / valid.length) * 100);
        return { courseHeat, maxFreq, typeCount, strikeRate, totalPitches: valid.length };
      }, [pitches, analysisFilter]);

      const uniquePitchers = useMemo(() => Array.from(new Set(pitches.map(p => p.pitcherName).filter(Boolean))), [pitches]);
      const currentAtBatPitches = pitches.filter(p => p.inning === gameState.inning && p.isTop === gameState.isTop && p.batter === currentBatterIndex + 1);

      const courses = Array.from({ length: 25 }, (_, i) => i);
      const isStrikeZone = (i) => { const row = Math.floor(i / 5); const col = i % 5; return row >= 1 && row <= 3 && col >= 1 && col <= 3; };
      const pitchTypes = [{ name: 'ストレート系', color: 'bg-red-500' }, { name: 'スライダー系', color: 'bg-blue-500' }, { name: 'カーブ系', color: 'bg-yellow-500' }, { name: '落ちる系', color: 'bg-purple-500' }, { name: 'シュート系', color: 'bg-green-500' }];

      const copyShareText = () => {
        const topTotal = gameState.runs.top.reduce((a,b)=>a+b,0);
        const bottomTotal = gameState.runs.bottom.reduce((a,b)=>a+b,0);
        let text = `【結果】${gameInfo.date} ${gameInfo.teamTop} ${topTotal} - ${bottomTotal} ${gameInfo.teamBottom}\n\n`;

        const pitcherStats = {}; 
        const batterStats = { top: {}, bottom: {} }; 
        
        lineups.top.forEach((p, i) => batterStats.top[i+1] = { name: p.name, pos: p.pos, results: [] });
        lineups.bottom.forEach((p, i) => batterStats.bottom[i+1] = { name: p.name, pos: p.pos, results: [] });

        pitches.forEach(p => {
          if (p.result !== '牽制' && p.result !== '盗塁死' && p.result !== 'その他出塁' && p.pitcherName) {
            if (!pitcherStats[p.pitcherName]) pitcherStats[p.pitcherName] = { pitches: 0, k: 0, bb: 0, hits: 0 };
            pitcherStats[p.pitcherName].pitches++;
          }
        });

        const abKeys = new Set();
        pitches.forEach(p => abKeys.add(`${p.inning}-${p.isTop}-${p.batter}`));

        abKeys.forEach(key => {
          const parts = key.split('-');
          const inning = parseInt(parts[0]);
          const isTop = parts[1] === 'true';
          const batter = parseInt(parts[2]);

          const abPitches = pitches.filter(p => p.inning === inning && p.isTop === isTop && p.batter === batter);
          if (abPitches.length === 0) return;

          const lastPitch = abPitches[abPitches.length - 1];
          const pitcherName = lastPitch.pitcherName || '不明';
          if (!pitcherStats[pitcherName]) pitcherStats[pitcherName] = { pitches: 0, k: 0, bb: 0, hits: 0 };

          let s = 0; let b = 0; let resultStr = '';

          for (let p of abPitches) {
            if (p.result === 'ボール') b++;
            else if (p.result === 'ストライク' || p.result === '空振り') s++;
            else if (p.result === 'ファウル' && s < 2) s++;
          }

          const isHitPlay = ['安', '塁打', '本塁打'].some(w => lastPitch.result.includes(w));

          if (isHitPlay) {
            resultStr = lastPitch.result;
            pitcherStats[pitcherName].hits++;
          } else if (lastPitch.result === '死球') {
            resultStr = '死球';
            pitcherStats[pitcherName].bb++; 
          } else if (lastPitch.result === 'その他出塁') {
            resultStr = '他出塁';
          } else {
            resultStr = lastPitch.result;
            if (resultStr === '三振') pitcherStats[pitcherName].k++;
            if (resultStr === '四球') pitcherStats[pitcherName].bb++;
          }

          if (resultStr && resultStr !== '牽制' && resultStr !== '盗塁死') {
            const teamKey = isTop ? 'top' : 'bottom';
            if(batterStats[teamKey][batter]) {
                batterStats[teamKey][batter].results.push(resultStr);
            }
          }
        });

        text += `【投手成績】\n`;
        Object.keys(pitcherStats).forEach(pName => {
          const st = pitcherStats[pName];
          text += `${pName}: ${st.pitches}球 / 奪三振${st.k} / 与四死球${st.bb} / 被安打${st.hits}\n`;
        });
        text += `\n`;

        text += `【打席結果: ${gameInfo.teamTop}】\n`;
        Object.keys(batterStats.top).forEach(order => {
          const b = batterStats.top[order];
          const resultsStr = b.results.length > 0 ? b.results.join('、') : '-';
          text += `${order}番(${b.pos}) ${b.name}: ${resultsStr}\n`;
        });
        text += `\n`;

        text += `【打席結果: ${gameInfo.teamBottom}】\n`;
        Object.keys(batterStats.bottom).forEach(order => {
          const b = batterStats.bottom[order];
          const resultsStr = b.results.length > 0 ? b.results.join('、') : '-';
          text += `${order}番(${b.pos}) ${b.name}: ${resultsStr}\n`;
        });
        text += `\n`;

        text += `総数:${analysisData.totalPitches}球 / ストライク率:${analysisData.strikeRate}%`;
        const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        alert('結果をコピーしました！'); document.body.removeChild(ta);
      };

      const exportCSV = () => {
        const rows = pitches.map(p => [p.inning, p.isTop?'表':'裏', p.pitcherName, p.pitchNumber, p.type, p.result].join(','));
        const content = "data:text/csv;charset=utf-8,\uFEFF" + ["回,表裏,投手,球数,球種,結果", ...rows].join('\n');
        const link = document.createElement("a"); link.setAttribute("href", encodeURI(content)); link.setAttribute("download", `試合データ.csv`); link.click();
      };

      return (
        <div className="min-h-screen bg-slate-100 flex flex-col font-sans text-slate-800 pb-10 text-sm h-screen overflow-hidden">
          
          <header className="bg-white shadow-sm border-b border-slate-200 p-4 flex items-center justify-between shrink-0">
            <div className="flex items-center gap-2 text-xl font-bold text-blue-700 tracking-tighter">⚾ 配球分析</div>
            
            <div className="flex bg-slate-50 border border-slate-300 rounded-lg overflow-hidden text-sm shadow-inner">
              <div className="flex flex-col bg-slate-200 font-bold border-r border-slate-300 w-24">
                <input type="text" value={gameInfo.teamTop} onChange={e=>setGameInfo({...gameInfo, teamTop: e.target.value})} className="h-8 bg-transparent text-center outline-none border-b border-slate-300 px-1 font-bold" />
                <input type="text" value={gameInfo.teamBottom} onChange={e=>setGameInfo({...gameInfo, teamBottom: e.target.value})} className="h-8 bg-transparent text-center outline-none px-1 font-bold" />
              </div>
              {[1,2,3,4,5,6,7,8,9].map(i => (
                <div key={i} className={`flex flex-col border-r border-slate-300 text-center w-8 ${gameState.inning === i ? 'bg-blue-100' : ''}`}>
                  <div className="h-8 border-b border-slate-300 flex items-center justify-center font-bold text-[10px]">{gameState.runs.top[i-1] > 0 ? gameState.runs.top[i-1] : (gameState.inning > i || (gameState.inning === i && !gameState.isTop) ? '0' : '')}</div>
                  <div className="h-8 flex items-center justify-center font-bold text-[10px]">{gameState.runs.bottom[i-1] > 0 ? gameState.runs.bottom[i-1] : (gameState.inning > i ? '0' : '')}</div>
                </div>
              ))}
              <div className="flex flex-col text-center w-10 font-bold bg-blue-50 text-blue-800">
                <div className="h-8 border-b border-slate-300 flex items-center justify-center">{gameState.runs.top.reduce((a,b)=>a+b,0)}</div>
                <div className="h-8 flex items-center justify-center">{gameState.runs.bottom.reduce((a,b)=>a+b,0)}</div>
              </div>
            </div>

            <div className="flex gap-4 items-center">
              <div className="flex flex-col gap-0.5 items-center px-4 border-r font-mono">
                <div className="flex items-center gap-1 font-bold"><span className="text-[10px] w-3 text-green-600">B</span>{[0,1,2].map(i=><div key={i} className={`w-3.5 h-3.5 rounded-full border border-green-600 ${i<gameState.balls?'bg-green-500 shadow-inner':'bg-slate-100'}`}></div>)}</div>
                <div className="flex items-center gap-1 font-bold"><span className="text-[10px] w-3 text-yellow-500">S</span>{[0,1].map(i=><div key={i} className={`w-3.5 h-3.5 rounded-full border border-yellow-500 ${i<gameState.strikes?'bg-yellow-400 shadow-inner':'bg-slate-100'}`}></div>)}</div>
                <div className="flex items-center gap-1 font-bold"><span className="text-[10px] w-3 text-red-600">O</span>{[0,1].map(i=><div key={i} className={`w-3.5 h-3.5 rounded-full border border-red-600 ${i<gameState.outs?'bg-red-500 shadow-inner':'bg-slate-100'}`}></div>)}</div>
              </div>
              <div className="flex flex-col gap-1.5 font-sans">
                <button onClick={handleNewGame} className="bg-red-50 text-red-600 px-3 py-0.5 rounded text-[10px] font-bold border border-red-200 shadow-sm active:bg-red-100 transition-colors">🔄 新試合</button>
                <div className="flex gap-1.5">
                  <button onClick={()=>setShowSettings(true)} className="bg-slate-200 px-2 py-0.5 rounded text-[10px] font-bold border border-slate-300 shadow-sm">⚙️ オーダー</button>
                  <button onClick={()=>setShowExport(true)} className="bg-blue-600 text-white px-2 py-0.5 rounded text-[10px] font-bold shadow-sm">📥 共有</button>
                </div>
              </div>
            </div>
          </header>

          <main className="flex-1 flex p-4 gap-4 max-w-7xl mx-auto w-full overflow-hidden">
            <div className="w-[55%] flex flex-col gap-4 overflow-y-auto pr-1">
              <div className="bg-white rounded-xl shadow-sm p-4 flex justify-between items-center border border-slate-200 shrink-0">
                <div className="text-xl font-black text-slate-800">{gameState.inning}回{gameState.isTop?'表':'裏'}</div>
                <div className="flex items-center gap-2">
                  <div className="text-[11px] font-bold bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200 flex items-center gap-3">
                    <div className="flex items-center gap-1"><span className="text-red-700 font-black">投:</span> <span>{currentPitcherObj.name}</span></div>
                    <div className="flex items-center gap-1">
                      <span className="text-blue-700 font-black">打:</span> 
                      <select 
                        value={gameState.isTop ? gameState.batterTop : gameState.batterBottom} 
                        onChange={(e) => manuallyChangeBatter(Number(e.target.value))}
                        className="bg-white border border-blue-300 text-blue-700 rounded px-1 outline-none font-black cursor-pointer shadow-sm"
                      >
                        {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => <option key={n} value={n}>{n}番</option>)}
                      </select>
                      <span className="text-blue-700 font-black">{currentBatterObj.name}</span>
                    </div>
                    <button onClick={()=>{ recordAction(); setShowSettings(true); }} className="bg-white border border-slate-300 px-2 py-0.5 rounded text-[10px] text-slate-600 shadow-sm active:bg-slate-100 font-bold transition-colors">🔄 交代</button>
                  </div>
                  <div className="flex items-center bg-blue-50 rounded-lg border border-blue-200 p-1">
                    <button onClick={()=>changeScore(gameState.isTop?'top':'bottom', -1)} className="p-1 text-blue-600 font-black w-6 hover:bg-blue-100 rounded text-lg">－</button>
                    <span className="px-1 text-[10px] font-bold text-blue-800 uppercase tracking-tighter">Run</span>
                    <button onClick={()=>changeScore(gameState.isTop?'top':'bottom', 1)} className="p-1 text-blue-600 font-black w-6 hover:bg-blue-100 rounded text-lg">＋</button>
                  </div>
                </div>
              </div>

              {!showInPlayResult ? (
                <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200 flex-1 flex flex-col min-h-fit">
                  <div className="flex gap-8 flex-1">
                    <div className="flex-1 flex flex-col items-center justify-center">
                      <div className="grid grid-cols-5 grid-rows-5 w-64 h-64 gap-1 relative bg-slate-50 p-2 rounded-lg border border-slate-200 shadow-inner">
                        <div className="absolute top-[20%] left-[20%] w-[60%] h-[60%] border-4 border-slate-800 pointer-events-none rounded-sm z-10"></div>
                        {courses.map(i => (
                          <button key={i} onClick={() => setCurrentPitch({ ...currentPitch, course: i })} className={`rounded-sm relative ${isStrikeZone(i) ? 'bg-white' : 'bg-slate-100'} ${currentPitch.course === i ? 'ring-4 ring-blue-500 bg-blue-100 z-20 scale-110 shadow-lg' : 'border border-slate-200 hover:bg-white/50'}`}>
                            {currentPitch.course === i && <div className="absolute inset-0 bg-blue-500 opacity-20"></div>}
                          </button>
                        ))}
                      </div>
                      <div className="text-[10px] font-bold text-slate-400 mt-4 tracking-widest uppercase italic font-sans">捕手目線</div>
                    </div>
                    <div className="flex-1 flex flex-col justify-between py-2">
                      <div className="space-y-4">
                        <div className="flex flex-wrap gap-1.5">
                          {pitchTypes.map(pt => (
                            <button key={pt.name} onClick={() => setCurrentPitch({ ...currentPitch, type: pt.name })} className={`px-2.5 py-1.5 rounded-lg font-bold text-[10px] border-2 transition-all ${currentPitch.type === pt.name ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm scale-105' : 'border-slate-100 bg-white text-slate-500'}`}>
                              {pt.name}
                            </button>
                          ))}
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                          <button onClick={() => recordPitch('ストライク')} className="bg-slate-800 text-white py-3 rounded-xl font-bold text-xs shadow-md active:bg-black transition-colors">見逃しS</button>
                          <button onClick={() => recordPitch('空振り')} className="bg-slate-600 text-white py-3 rounded-xl font-bold text-xs shadow-md active:bg-slate-700 transition-colors">空振りS</button>
                          <button onClick={() => recordPitch('ボール')} className="bg-green-600 text-white py-3 rounded-xl font-bold text-xs shadow-md active:bg-green-700 transition-colors">ボール</button>
                          <button onClick={() => recordPitch('ファウル')} className="bg-yellow-500 text-white py-3 rounded-xl font-bold text-xs shadow-md active:bg-yellow-600 transition-colors">ファウル</button>
                        </div>
                        <div className="grid grid-cols-4 gap-2">
                          <button onClick={() => recordPitch('死球')} className="bg-purple-600 text-white py-3 rounded-xl font-bold text-xs shadow-md active:bg-purple-700 transition-colors">死球</button>
                          <button onClick={() => recordPitch('牽制')} className="bg-orange-500 text-white py-3 rounded-xl font-bold text-xs shadow-md active:bg-orange-600 transition-colors">牽制</button>
                          <button onClick={() => recordPitch('盗塁死')} className="bg-rose-600 text-white py-3 rounded-xl font-bold text-xs shadow-md active:bg-rose-700 transition-colors">盗塁死</button>
                          <button onClick={() => recordPitch('その他出塁')} className="bg-teal-600 text-white py-3 rounded-xl font-bold text-[10px] shadow-md active:bg-teal-700 transition-colors tracking-tighter">他出塁</button>
                        </div>
                        <button onClick={() => recordPitch('インプレー')} className="w-full bg-blue-600 text-white py-3.5 rounded-xl font-black text-base shadow-lg active:scale-95 transition-transform font-bold mt-1">打った！ (インプレー)</button>
                        
                        <div className="grid grid-cols-2 gap-3 mt-4 border-t pt-4">
                          <button onClick={handleUndo} disabled={undoStack.length === 0} className={`py-3 rounded-xl font-black text-xs flex items-center justify-center gap-2 border-2 transition-all ${undoStack.length > 0 ? 'bg-white border-slate-800 text-slate-800 active:bg-slate-100' : 'bg-slate-50 border-slate-200 text-slate-200 cursor-not-allowed'}`}>
                            <span>↩️ 戻る</span>{undoStack.length > 0 && <span className="bg-slate-800 text-white text-[9px] px-1.5 rounded-full font-mono">{undoStack.length}</span>}
                          </button>
                          <button onClick={handleRedo} disabled={redoStack.length === 0} className={`py-3 rounded-xl font-black text-xs flex items-center justify-center gap-2 border-2 transition-all ${redoStack.length > 0 ? 'bg-white border-blue-600 text-blue-600 active:bg-blue-50 shadow-sm' : 'bg-slate-50 border-slate-200 text-slate-200 cursor-not-allowed'}`}>
                            <span>進む ↪️</span>{redoStack.length > 0 && <span className="bg-blue-600 text-white text-[9px] px-1.5 rounded-full font-mono">{redoStack.length}</span>}
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              ) : (
                <div className="bg-white rounded-2xl shadow-lg p-6 border border-blue-300 flex-1 flex flex-col bg-blue-50/30 min-h-[400px]">
                  <div className="flex justify-between items-center mb-6 border-b border-blue-200 pb-3">
                    <h2 className="text-lg font-black text-blue-800 flex items-center gap-2 tracking-tight font-sans font-bold">🎯 打撃結果の入力</h2>
                    <button onClick={() => handleUndo()} className="text-xs bg-white px-4 py-2 rounded-full border border-slate-300 shadow-sm font-bold text-slate-500">↩️ 取消して戻る</button>
                  </div>
                  {!selectedPosition ? (
                    <div className="flex-1 flex flex-col items-center">
                      <p className="text-slate-500 font-bold mb-8 text-base tracking-wide font-sans">① 打球の方向を選択</p>
                      <div className="grid grid-cols-3 gap-4 w-full max-w-[360px]">
                        {['左', '中', '右', '遊', '二', '三', '投', '捕', '一'].map(pos => (
                          <button key={pos} onClick={() => { recordAction(); setSelectedPosition(pos); }} className="bg-white border-2 border-slate-200 py-6 rounded-2xl font-black text-2xl shadow-sm hover:border-blue-400 active:scale-90 transition-all font-bold">{pos}</button>
                        ))}
                      </div>
                    </div>
                  ) : (
                    <div className="flex-1 flex flex-col items-center animate-in slide-in-from-right duration-150 w-full">
                      <p className="text-slate-600 font-bold mb-6 text-lg">② <span className="text-blue-700 text-2xl font-black px-2">{selectedPosition}</span> への結果は？</p>
                      <div className="w-full space-y-6 max-w-md">
                        <div className="bg-white p-4 rounded-xl border border-red-100 shadow-sm"><div className="grid grid-cols-3 gap-3">
                          <button onClick={() => handleInPlayFinalResult('ゴロ', 1)} className="bg-red-50 text-red-700 py-4 rounded-xl font-bold active:bg-red-100 transition-colors">ゴロ</button>
                          <button onClick={() => handleInPlayFinalResult('飛', 1)} className="bg-orange-50 text-orange-700 py-4 rounded-xl font-bold active:bg-orange-100 transition-colors">飛/直</button>
                          <button onClick={() => handleInPlayFinalResult('併殺打', 2)} className="bg-red-600 text-white py-4 rounded-xl font-bold shadow-md active:bg-red-700 transition-colors">併殺打</button>
                        </div></div>
                        <div className="bg-white p-4 rounded-xl border border-blue-100 shadow-sm"><div className="grid grid-cols-4 gap-2 mb-2">
                          <button onClick={() => handleInPlayFinalResult('安', 0)} className="bg-blue-50 text-blue-700 py-4 rounded-xl font-bold active:bg-blue-100 transition-colors">単打</button>
                          <button onClick={() => handleInPlayFinalResult('二塁打', 0)} className="bg-indigo-50 text-indigo-700 py-4 rounded-xl font-bold active:bg-indigo-100 transition-colors">二塁</button>
                          <button onClick={() => handleInPlayFinalResult('三塁打', 0)} className="bg-purple-50 text-purple-700 py-4 rounded-xl font-bold active:bg-purple-100 transition-colors">三塁</button>
                          <button onClick={() => handleInPlayFinalResult('本塁打', 0)} className="bg-pink-100 text-pink-700 py-4 rounded-xl font-bold shadow-sm active:bg-pink-200 transition-colors">本塁打</button>
                        </div></div>
                        <button onClick={() => setSelectedPosition(null)} className="w-full py-3 text-slate-400 font-bold border-2 border-dashed border-slate-300 rounded-xl hover:bg-slate-50 transition-colors font-sans">← 方向を選び直す</button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* 右側：分析・履歴エリア */}
            <div className="w-[45%] flex flex-col gap-4 overflow-hidden font-sans">
              <div className="bg-white rounded-2xl shadow-sm p-4 border border-slate-200 shrink-0">
                <div className="flex justify-between items-center mb-3 border-b pb-2">
                  <h2 className="text-[11px] font-bold uppercase tracking-wider text-slate-500 italic font-bold tracking-widest font-sans uppercase">📊 Stats <span className="font-mono ml-2">Pitches:{analysisData.totalPitches}</span></h2>
                  <div className="flex gap-1.5 font-bold">
                    <select value={analysisFilter.pitcher} onChange={e => setAnalysisFilter({...analysisFilter, pitcher: e.target.value})} className="border border-slate-200 rounded text-[9px] px-1.5 py-1 bg-slate-50 outline-none shadow-sm">
                      <option value="ALL">全投手</option>{uniquePitchers.map(p => <option key={p} value={p}>{p}</option>)}
                    </select>
                    <select value={analysisFilter.batterSide} onChange={e => setAnalysisFilter({...analysisFilter, batterSide: e.target.value})} className="border border-slate-200 rounded text-[9px] px-1.5 py-1 bg-slate-50 outline-none shadow-sm">
                      <option value="ALL">全打者</option><option value="右">右打者</option><option value="左">左打者</option>
                    </select>
                  </div>
                </div>
                <div className="flex gap-6 items-center">
                  <div className="grid grid-cols-5 grid-rows-5 w-32 h-32 gap-0.5 relative bg-slate-100 p-1 rounded border border-slate-200 shadow-inner shrink-0">
                    <div className="absolute top-[20%] left-[20%] w-[60%] h-[60%] border-2 border-slate-800 pointer-events-none rounded-sm z-10"></div>
                    {courses.map(i => {
                      const count = analysisData.courseHeat[i] || 0;
                      const opacity = analysisData.maxFreq === 0 ? 0 : count / analysisData.maxFreq;
                      return <div key={`heat-${i}`} className="bg-white relative flex items-center justify-center text-[8px] font-bold text-slate-700">{count > 0 && <div className="absolute inset-0 bg-red-500 opacity-60" style={{ opacity: opacity * 0.8 }}></div>}<span className="relative z-10">{count > 0 ? count : ''}</span></div>;
                    })}
                  </div>
                  <div className="flex-1 space-y-3">
                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 shadow-inner font-bold">
                      <div className="text-[9px] text-slate-400 mb-0.5 uppercase tracking-widest">Strike Rate</div>
                      <div className="text-3xl font-black text-slate-800 leading-none">{analysisData.strikeRate}<span className="text-sm font-bold">%</span></div>
                    </div>
                    <div className="bg-slate-50 p-2 rounded-xl border border-slate-200 overflow-hidden font-bold">
                      {Object.entries(analysisData.typeCount).sort(([,a], [,b]) => b - a).slice(0, 3).map(([type, count]) => {
                        const pct = Math.round((count / (analysisData.totalPitches || 1)) * 100);
                        return <div key={type} className="flex items-center gap-2 text-[9px] mb-1.5 last:mb-0"><div className="w-16 truncate">{type}</div><div className="flex-1 bg-slate-200 h-1.5 rounded-full overflow-hidden"><div className="bg-blue-500 h-full transition-all duration-700" style={{ width: `${pct}%` }}></div></div><div className="w-6 text-right text-slate-400 font-mono tracking-tighter">{pct}%</div></div>;
                      })}
                    </div>
                  </div>
                </div>
              </div>

              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden">
                 <h2 className="text-xs font-bold bg-slate-100 p-3 border-b border-slate-200 text-slate-700 flex justify-between items-center shrink-0 tracking-tight font-sans">
                  <span>打席履歴（{currentBatterObj.name}）</span>
                  <span className="text-[10px] bg-white border border-slate-300 px-2 py-0.5 rounded-full shadow-sm font-mono font-bold">{currentAtBatPitches.length} 球</span>
                </h2>
                <div className="flex-1 overflow-y-auto p-3 flex flex-col gap-2.5 bg-slate-50/50 grid-bg font-sans">
                  {currentAtBatPitches.length === 0 ? (
                    <div className="text-center text-slate-300 text-[10px] mt-12 italic uppercase font-bold tracking-widest tracking-widest font-sans uppercase">No Record</div>
                  ) : (
                    currentAtBatPitches.map((p, idx) => (
                      <div key={idx} className="bg-white p-2.5 rounded-xl shadow-sm border border-slate-200 flex items-center gap-4 animate-in fade-in slide-in-from-bottom-1 duration-200">
                        <div className="font-black text-xl text-slate-300 w-5 font-mono">{p.pitchNumber}</div>
                        <div className="grid grid-cols-5 grid-rows-5 w-8 h-8 gap-[1px] bg-slate-200 border border-slate-300 relative shadow-inner shrink-0">
                          <div className="absolute top-[20%] left-[20%] w-[60%] h-[60%] border border-slate-800 z-10 pointer-events-none"></div>
                          {p.course !== null && courses.map(i => <div key={i} className={`${p.course === i ? 'bg-red-500 z-20 relative shadow-sm ring-1 ring-white/50' : isStrikeZone(i) ? 'bg-white' : 'bg-transparent'}`}></div>)}
                        </div>
                        <div className="flex-1 truncate font-bold text-[11px] text-slate-700 tracking-tighter">{p.type}</div>
                        <div className={`text-white text-[9px] font-black px-3 py-1 rounded-full shadow-sm whitespace-nowrap ${p.result.includes('ストライク')?'bg-yellow-500':p.result==='ボール'?'bg-green-600':p.result==='死球'?'bg-purple-600':p.result==='その他出塁'?'bg-teal-600':['安','塁打','本塁打'].some(w=>p.result.includes(w))?'bg-blue-600':p.result==='牽制'?'bg-orange-500':p.result==='盗塁死'?'bg-rose-600':'bg-red-500'}`}>{p.result}</div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          </main>

          {/* 設定・オーダー（選手交代）モーダル */}
          {showSettings && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in duration-200 font-sans">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden ring-1 ring-white/20">
                <div className="p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50/80">
                  <div className="flex flex-col">
                    <h2 className="text-xl font-black text-slate-800 flex items-center gap-2 tracking-tight font-bold">📋 選手交代・オーダー設定</h2>
                    <p className="text-[10px] text-slate-500 font-bold mt-1">※ここで守備位置や名前を変更すると、以降の打席や配球記録に即座に反映されます。</p>
                  </div>
                  <button onClick={() => setShowSettings(false)} className="bg-slate-800 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-black active:scale-95 transition-all">完了して戻る</button>
                </div>
                <div className="p-8 overflow-y-auto flex-1 grid grid-cols-2 gap-10 bg-slate-50/30">
                  {['top', 'bottom'].map(team => (
                    <div key={team} className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm flex flex-col font-bold bg-white">
                      <div className={`p-4 font-black flex items-center gap-3 ${team==='top'?'bg-blue-100 text-blue-800':'bg-red-100 text-red-800'}`}>
                        <span className="text-sm px-2 py-0.5 bg-white/50 rounded-lg font-bold">{team==='top'?'先攻':'後攻'}</span>
                        <input type="text" value={gameInfo[team==='top'?'teamTop':'teamBottom']} onChange={e=>setGameInfo({...gameInfo, [team==='top'?'teamTop':'teamBottom']: e.target.value})} className="flex-1 rounded-xl px-3 py-1 outline-none border border-transparent focus:bg-white/80 transition-all font-black shadow-sm" />
                      </div>
                      <table className="w-full text-[11px] text-center table-fixed font-sans">
                        <thead className="bg-slate-50 text-slate-400 tracking-widest font-black uppercase tracking-widest border-b border-slate-200"><tr><th className="py-2 w-8">順</th><th className="py-2 w-12">守備</th><th className="py-2 text-left px-3">選手名</th><th className="w-16">投/打</th></tr></thead>
                        <tbody className="bg-white">
                          {lineups[team].map((p, i) => (
                            <tr key={i} className="border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors font-bold">
                              <td className="py-2 text-slate-400 font-mono italic">{i+1}</td>
                              <td><input type="text" value={p.pos} onChange={e => { recordAction(); const newL = [...lineups[team]]; newL[i].pos = e.target.value; setLineups({...lineups, [team]: newL}); }} className="w-10 border border-slate-200 rounded-lg text-center py-1 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 shadow-inner font-black" /></td>
                              <td className="px-3"><input type="text" value={p.name} onChange={e => { recordAction(); const newL = [...lineups[team]]; newL[i].name = e.target.value; setLineups({...lineups, [team]: newL}); }} className="w-full border border-slate-200 rounded-lg px-2 py-1 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 shadow-inner font-bold text-slate-700" /></td>
                              <td className="pr-2">
                                <select value={`${p.throws}${p.bats}`} onChange={e => { recordAction(); const val = e.target.value; const newL = [...lineups[team]]; newL[i].throws = val[0]; newL[i].bats = val[1]; setLineups({...lineups, [team]: newL}); }} className="w-full border border-slate-200 rounded-lg py-1 outline-none text-[9px] bg-slate-50 font-black text-center shadow-sm cursor-pointer">
                                  <option value="右右">右/右</option><option value="右左">右/左</option><option value="左右">左/右</option><option value="左左">左/左</option>
                                </select>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* 共有モーダル */}
          {showExport && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-md animate-in zoom-in duration-200 font-sans">
              <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md p-8 relative overflow-hidden font-sans">
                <button onClick={() => setShowExport(false)} className="absolute top-6 right-6 text-2xl font-black text-slate-300 hover:text-slate-600 transition-colors font-bold font-sans">✕</button>
                <div className="flex flex-col items-center mb-8">
                  <div className="w-16 h-16 bg-blue-100 rounded-3xl flex items-center justify-center text-blue-600 text-3xl mb-4 shadow-inner tracking-tighter font-sans uppercase">📥</div>
                  <h2 className="text-2xl font-black text-slate-800 font-sans font-bold">共有と出力</h2>
                </div>
                <div className="flex flex-col gap-4 font-bold">
                  <button onClick={copyShareText} className="bg-slate-800 hover:bg-black text-white py-5 rounded-2xl font-black shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">📋 結果をコピー</button>
                  <button onClick={exportCSV} className="bg-green-600 hover:bg-green-700 text-white py-5 rounded-2xl font-black shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">📥 CSV保存 (Excel用)</button>
                </div>
                <p className="mt-8 text-[10px] text-slate-400 text-center font-bold font-sans tracking-tight">データは本体に保存されています。<br/>新しい試合を始めるには「新試合」を押してください。</p>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
