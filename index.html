<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="配球スコア">
  <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/26be.png">
  <title>配球スコア・分析アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { -webkit-touch-callout: none; overscroll-behavior-y: none; user-select: none; }
    ::-webkit-scrollbar { display: none; }
    .modal-scroll { overflow-y: auto !important; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; touch-action: pan-y; }
    .modal-scroll::-webkit-scrollbar { display: block; width: 4px; }
    .modal-scroll::-webkit-scrollbar-thumb { background-color: #94a3b8; border-radius: 4px; }
    .modal-overlay { touch-action: auto; overflow: hidden; }
    .grid-bg { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
    input:focus { background-color: white !important; }
    .custom-scrollbar::-webkit-scrollbar { display: block; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 4px; }
  </style>
</head>
<body class="bg-slate-100 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const CountColumn = ({ title, data }) => {
      const total = data.total || 0;
      const strikes = data.strikes || 0;
      const strikePct = total > 0 ? Math.round((strikes / total) * 100) : 0;
      const typeData = data.types || {};
      
      return (
        <div className="flex flex-col gap-1.5">
          <div className="text-[10px] text-slate-400 text-center font-bold mb-1 flex flex-col">
            <span>{title}</span>
            {total > 0 ? <span className="text-blue-300 mt-0.5">S率: {strikePct}%</span> : <span className="text-slate-600 mt-0.5">-</span>}
          </div>
          {total === 0 ? <div className="text-center text-xs text-slate-600 mt-2">-</div> : 
            Object.entries(typeData).sort((a,b)=>b[1]-a[1]).map(([type, count]) => {
              const pct = Math.round((count/total)*100);
              return (
                <div key={type} className="flex items-center gap-1.5 text-[10px]">
                  <span className="w-12 truncate text-slate-300 font-bold">{type}</span>
                  <div className="flex-1 bg-slate-700 h-1.5 rounded-full overflow-hidden">
                    <div className="bg-blue-400 h-full" style={{ width: `${pct}%`}}></div>
                  </div>
                  <span className="w-6 text-right font-mono text-blue-300">{pct}%</span>
                </div>
              )
            })
          }
        </div>
      )
    };

    const renderCountStats = (countsObj, title) => (
      <div className="flex-1 border border-slate-700 rounded-lg p-3 bg-slate-800/80 shadow-md">
        <h5 className="text-white font-bold text-xs mb-3 text-center border-b border-slate-600 pb-2">{title}</h5>
        <div className="grid grid-cols-3 gap-3">
          <CountColumn title="有利 (S先行)" data={countsObj.ahead} />
          <CountColumn title="平行 (S=B)" data={countsObj.even} />
          <CountColumn title="不利 (B先行)" data={countsObj.behind} />
        </div>
      </div>
    );

    function App() {
      // --- ステート管理 ---
      const [gameState, setGameState] = useState(() => {
        const saved = localStorage.getItem('baseball_gameState');
        const initial = {
          inning: 1, isTop: true, outs: 0, balls: 0, strikes: 0, 
          batterTop: 1, batterBottom: 1,
          runners: { first: false, second: false, third: false },
          runs: { top: [0,0,0,0,0,0,0,0,0], bottom: [0,0,0,0,0,0,0,0,0] }
        };
        if (!saved) return initial;
        
        const parsed = JSON.parse(saved);
        if (parsed.batter && !parsed.batterTop) {
          parsed.batterTop = parsed.batter;
          parsed.batterBottom = 1;
        }
        parsed.batterTop = parsed.batterTop || 1;
        parsed.batterBottom = parsed.batterBottom || 1;
        parsed.runners = parsed.runners || { first: false, second: false, third: false };
        parsed.runs = parsed.runs || { top: [0,0,0,0,0,0,0,0,0], bottom: [0,0,0,0,0,0,0,0,0] };
        return parsed;
      });

      const [gameInfo, setGameInfo] = useState(() => {
        const saved = localStorage.getItem('baseball_gameInfo');
        return saved ? JSON.parse(saved) : { date: new Date().toISOString().split('T')[0], teamTop: '先攻チーム', teamBottom: '後攻チーム' };
      });

      const [lineups, setLineups] = useState(() => {
        const saved = localStorage.getItem('baseball_lineups');
        if (saved) {
            let parsed = JSON.parse(saved);
            if (parsed.top.length === 9) {
                parsed.top.push({ order: '投', name: '', pos: '投', throws: '右', bats: '右' });
            }
            if (parsed.bottom.length === 9) {
                parsed.bottom.push({ order: '投', name: '', pos: '投', throws: '右', bats: '右' });
            }
            return parsed;
        }
        return {
          top: Array.from({length: 10}, (_,i)=>({ order: i<9 ? i+1 : '投', name: i<9 ? `先攻${i+1}番` : `先発投手`, pos: i===9?'投':'未', throws: '右', bats: '右' })),
          bottom: Array.from({length: 10}, (_,i)=>({ order: i<9 ? i+1 : '投', name: i<9 ? `後攻${i+1}番` : `先発投手`, pos: i===9?'投':'未', throws: '右', bats: '右' }))
        };
      });

      const [pitches, setPitches] = useState(() => {
        const saved = localStorage.getItem('baseball_pitches');
        return saved ? JSON.parse(saved) : [];
      });

      const [undoStack, setUndoStack] = useState([]);
      const [redoStack, setRedoStack] = useState([]);

      const [savedGames, setSavedGames] = useState(() => {
        const saved = localStorage.getItem('baseball_savedGames');
        return saved ? JSON.parse(saved) : [];
      });
      const [showArchiveModal, setShowArchiveModal] = useState(false);
      
      const [myTeam, setMyTeam] = useState(() => {
        const saved = localStorage.getItem('baseball_myTeam');
        return saved ? JSON.parse(saved) : null;
      });
      const [showTeamManager, setShowTeamManager] = useState(false);
      const [showCrossGameStats, setShowCrossGameStats] = useState(false);

      const [showSettings, setShowSettings] = useState(false);
      const [showExport, setShowExport] = useState(false);
      const [showInPlayResult, setShowInPlayResult] = useState(false);
      
      const [showAdvanceModal, setShowAdvanceModal] = useState(false);
      const [advanceData, setAdvanceData] = useState({ runner: '', reason: '', to: '' });

      const [showOutRunnerModal, setShowOutRunnerModal] = useState(false);
      const [outRunnerData, setOutRunnerData] = useState({ runner: '', reason: '盗塁死' });

      const [showPostGameAnalysis, setShowPostGameAnalysis] = useState(false);
      const [postGameTab, setPostGameTab] = useState('tendency');

      const [heatmapTab, setHeatmapTab] = useState('all'); 
      const [heatmapCountTab, setHeatmapCountTab] = useState('all'); 
      const [pitcherHeatmapCountTab, setPitcherHeatmapCountTab] = useState('all'); 
      const [pitcherHeatmapTypeTab, setPitcherHeatmapTypeTab] = useState('split');
      const [expandedPitcher, setExpandedPitcher] = useState(null);
      const [expandedBatter, setExpandedBatter] = useState(null);

      const [selectedFielder, setSelectedFielder] = useState(null);
      const [selectedPosition, setSelectedPosition] = useState(null);
      const [analysisFilter, setAnalysisFilter] = useState({ pitcher: 'ALL', batterSide: 'ALL' });
      const [currentPitch, setCurrentPitch] = useState({ course: null, type: 'ストレート' });
      
      const [editingPitchIndex, setEditingPitchIndex] = useState(null);
      const [editPitchData, setEditPitchData] = useState(null);

      const [toast, setToast] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);

      const showToast = (text, type = 'success') => {
        setToast({ text, type });
        setTimeout(() => setToast(null), 3000);
      };

      // --- 永続化 (個別分割で不要な再書き込みを防止) ---
      useEffect(() => { localStorage.setItem('baseball_gameState', JSON.stringify(gameState)); }, [gameState]);
      useEffect(() => { localStorage.setItem('baseball_gameInfo', JSON.stringify(gameInfo)); }, [gameInfo]);
      useEffect(() => { localStorage.setItem('baseball_lineups', JSON.stringify(lineups)); }, [lineups]);
      useEffect(() => { localStorage.setItem('baseball_pitches', JSON.stringify(pitches)); }, [pitches]);
      useEffect(() => { localStorage.setItem('baseball_savedGames', JSON.stringify(savedGames)); }, [savedGames]);
      useEffect(() => { if (myTeam) localStorage.setItem('baseball_myTeam', JSON.stringify(myTeam)); }, [myTeam]);

      // --- 履歴管理 ---
      const createSnapshot = () => ({
        gameState: JSON.parse(JSON.stringify(gameState)),
        lineups: JSON.parse(JSON.stringify(lineups)),
        pitches: JSON.parse(JSON.stringify(pitches)),
        showInPlayResult,
        selectedPosition
      });

      const recordAction = () => {
        const snapshot = createSnapshot();
        setUndoStack(prev => [...prev, snapshot].slice(-20));
        setRedoStack([]); 
      };

      const handleUndo = () => {
        if (undoStack.length === 0) return;
        const currentSnapshot = createSnapshot();
        setRedoStack(prev => [...prev, currentSnapshot]);
        const last = undoStack[undoStack.length - 1];
        setGameState(last.gameState);
        setLineups(last.lineups);
        setPitches(last.pitches);
        setShowInPlayResult(last.showInPlayResult);
        setSelectedPosition(last.selectedPosition);
        setUndoStack(prev => prev.slice(0, -1));
      };

      const handleRedo = () => {
        if (redoStack.length === 0) return;
        const currentSnapshot = createSnapshot();
        setUndoStack(prev => [...prev, currentSnapshot]);
        const next = redoStack[redoStack.length - 1];
        setGameState(next.gameState);
        setLineups(next.lineups);
        setPitches(next.pitches);
        setShowInPlayResult(next.showInPlayResult);
        setSelectedPosition(next.selectedPosition);
        setRedoStack(prev => prev.slice(0, -1));
      };

      // --- カスタム確認ダイアログを利用した各種アクション ---
      const handleNewGame = () => {
        setConfirmDialog({
          title: '🔄 新試合の開始',
          message: '現在の試合データをすべて消去して、新しい試合を開始しますか？',
          subMessage: '※この操作は取り消せません',
          isDanger: true,
          onConfirm: () => {
            setGameState({
              inning: 1, isTop: true, outs: 0, balls: 0, strikes: 0, batterTop: 1, batterBottom: 1,
              runners: { first: false, second: false, third: false },
              runs: { top: [0,0,0,0,0,0,0,0,0], bottom: [0,0,0,0,0,0,0,0,0] }
            });
            setGameInfo({ date: new Date().toISOString().split('T')[0], teamTop: '先攻チーム', teamBottom: '後攻チーム' });
            setLineups({
              top: Array.from({length: 10}, (_,i)=>({ order: i<9 ? i+1 : '投', name: i<9 ? `先攻${i+1}番` : `先発投手`, pos: i===9?'投':'未', throws: '右', bats: '右' })),
              bottom: Array.from({length: 10}, (_,i)=>({ order: i<9 ? i+1 : '投', name: i<9 ? `後攻${i+1}番` : `先発投手`, pos: i===9?'投':'未', throws: '右', bats: '右' }))
            });
            setPitches([]);
            setUndoStack([]);
            setRedoStack([]);
            setConfirmDialog(null);
            showToast('新しい試合を開始し、オーダーをリセットしました');
          }
        });
      };

      const handleTieBreak = () => {
        setConfirmDialog({
          title: '⚡ 特別延長',
          message: '特別延長（0アウト1,2塁）をセットしますか？',
          subMessage: '※カウントはリセットされます',
          isDanger: false,
          onConfirm: () => {
            recordAction();
            setGameState(prev => ({
              ...prev, outs: 0, balls: 0, strikes: 0,
              runners: { first: true, second: true, third: false }
            }));
            setConfirmDialog(null);
          }
        });
      };

      const saveCurrentGame = () => {
        setConfirmDialog({
          title: '💾 アーカイブに保存',
          message: '現在の試合状態をアーカイブに保存しますか？',
          isDanger: false,
          onConfirm: () => {
            const newGame = {
              id: Date.now().toString(),
              date: gameInfo.date,
              teamTop: gameInfo.teamTop,
              teamBottom: gameInfo.teamBottom,
              scoreTop: gameState.runs.top.reduce((a,b)=>a+b,0),
              scoreBottom: gameState.runs.bottom.reduce((a,b)=>a+b,0),
              pitchesCount: pitches.length,
              data: { gameState, gameInfo, lineups, pitches }
            };
            setSavedGames([newGame, ...savedGames]);
            setConfirmDialog(null);
            showToast('試合を保存しました！', 'success');
          }
        });
      };

      const loadGame = (gameId) => {
        setConfirmDialog({
          title: '📂 データの読み込み',
          message: '現在の作業中データは上書きされます。本当に読み込みますか？',
          subMessage: '※必要であれば、先に今の状態を保存してください。',
          isDanger: true,
          onConfirm: () => {
            const target = savedGames.find(g => g.id === gameId);
            if (target) {
              setGameState(target.data.gameState);
              setGameInfo(target.data.gameInfo);
              setLineups(target.data.lineups);
              setPitches(target.data.pitches);
              setUndoStack([]);
              setRedoStack([]);
              setShowArchiveModal(false);
              setConfirmDialog(null);
              showToast('試合データを読み込みました', 'success');
            }
          }
        });
      };

      const deleteGame = (gameId) => {
        setConfirmDialog({
          title: '🗑️ アーカイブの削除',
          message: 'この保存データを完全に削除しますか？',
          subMessage: '（この操作は取り消せません）',
          isDanger: true,
          onConfirm: () => {
            setSavedGames(savedGames.filter(g => g.id !== gameId));
            setConfirmDialog(null);
          }
        });
      };

      const deletePitchRecord = () => {
        setConfirmDialog({
          title: '🗑️ 記録の削除',
          message: 'この記録を削除しますか？',
          subMessage: '※ランナーやアウト数は自動で戻りません。必要に応じて手動で直してください。',
          isDanger: true,
          onConfirm: () => {
            recordAction();
            const newPitches = [...pitches];
            const deletedPitch = newPitches.splice(editingPitchIndex, 1)[0];
            
            if (!deletedPitch.isEvent) {
               let currentNum = 1;
               newPitches.forEach(p => {
                 if (p.inning === deletedPitch.inning && p.isTop === deletedPitch.isTop && p.batter === deletedPitch.batter && !p.isEvent) {
                   p.pitchNumber = currentNum++;
                 }
               });
            }

            setPitches(newPitches);
            setEditingPitchIndex(null);
            setEditPitchData(null);
            setConfirmDialog(null);
            showToast("記録を削除しました", "success");
            
            if (gameState.inning === deletedPitch.inning && gameState.isTop === deletedPitch.isTop && gameState.batter === deletedPitch.batter) {
                const targetPitches = newPitches.filter(p => p.inning === gameState.inning && p.isTop === gameState.isTop && p.batter === gameState.batter);
                let newBalls = 0;
                let newStrikes = 0;
                const nonEventPitches = targetPitches.filter(p => !p.isEvent);
                for (let p of nonEventPitches) {
                  if (p.result === 'ボール' || p.result === 'ウエスト') newBalls++;
                  else if (p.result === 'ストライク' || p.result === '空振り') newStrikes++;
                  else if (p.result === 'ファウル' && newStrikes < 2) newStrikes++;
                }
                setGameState(prev => ({...prev, balls: newBalls, strikes: newStrikes}));
            }
          }
        });
      };

      const applyLineupToPast = () => {
        setConfirmDialog({
          title: '💡 過去の記録に一括反映',
          message: `現在表示している【${gameState.inning}回${gameState.isTop?'表':'裏'}】以降のすべての投球・イベント記録の「投手名」と「打者名」を書き換えますか？`,
          subMessage: '（※過去の入力忘れを修正する場合に使います）',
          isDanger: false,
          onConfirm: () => {
            recordAction();
            const newPitches = pitches.map(p => {
              let isAfter = false;
              if (p.inning > gameState.inning) isAfter = true;
              else if (p.inning === gameState.inning) {
                if (gameState.isTop) isAfter = true; 
                else if (!gameState.isTop && !p.isTop) isAfter = true; 
              }

              if (isAfter) {
                const offTeamLineup = p.isTop ? lineups.top : lineups.bottom;
                const defTeamLineup = p.isTop ? lineups.bottom : lineups.top;
                
                const batterObj = offTeamLineup[p.batter - 1] || { name: '打者未設定', bats: '右' };
                const pitcherObj = defTeamLineup.find(pl => pl.pos === '投' || pl.pos === '1' || pl.pos === '①') || { name: '投手未設定', throws: '右' };
                
                return {
                  ...p,
                  batterName: batterObj.name,
                  batterBats: batterObj.bats,
                  pitcherName: pitcherObj.name,
                  pitcherThrows: pitcherObj.throws
                };
              }
              return p;
            });
            
            setPitches(newPitches);
            setConfirmDialog(null);
            showToast(`記録を上書きしました！`, "success");
            setShowSettings(false);
          }
        });
      };

      const swapTopAndBottom = () => {
        setConfirmDialog({
          title: '⇅ 先攻/後攻の入替',
          message: '先攻と後攻のチーム名・オーダーを入れ替えますか？',
          subMessage: '（※すでに記録済みの打席データには影響しません）',
          isDanger: false,
          onConfirm: () => {
            recordAction();
            setGameInfo(prev => ({
              ...prev,
              teamTop: prev.teamBottom,
              teamBottom: prev.teamTop
            }));
            setLineups(prev => ({
              ...prev,
              top: prev.bottom,
              bottom: prev.top
            }));
            setConfirmDialog(null);
            showToast("先攻と後攻を入れ替えました！", "success");
          }
        });
      };

      // --- 試合進行ロジックつづき ---
      const jumpToInning = (inning, isTop) => {
        recordAction();
        const inningPitches = pitches.filter(p => p.inning === inning && p.isTop === isTop);
        let targetBatter = isTop ? gameState.batterTop : gameState.batterBottom;
        let newRunners = { first: false, second: false, third: false };
        let newOuts = 0;
        let newBalls = 0;
        let newStrikes = 0;

        if (inningPitches.length > 0) {
          const lastPitch = inningPitches[inningPitches.length - 1];
          targetBatter = lastPitch.batter;
          newRunners = lastPitch.runners || newRunners;
          newOuts = lastPitch.outs || 0;

          const targetPitches = inningPitches.filter(p => p.batter === targetBatter && !p.isEvent);
          for (let p of targetPitches) {
            if (p.result === 'ボール' || p.result === 'ウエスト') newBalls++;
            else if (p.result === 'ストライク' || p.result === '空振り') newStrikes++;
            else if (p.result === 'ファウル' && newStrikes < 2) newStrikes++;
          }
        }

        setGameState(prev => ({
          ...prev,
          inning, isTop,
          ...(isTop ? { batterTop: targetBatter } : { batterBottom: targetBatter }),
          runners: newRunners, outs: newOuts, balls: newBalls, strikes: newStrikes
        }));
        setShowInPlayResult(false);
        setSelectedPosition(null);
        setSelectedFielder(null);
      };

      const toggleRunner = (base) => {
        recordAction();
        setGameState(prev => ({
          ...prev,
          runners: { ...prev.runners, [base]: !prev.runners[base] }
        }));
      };

      const handleAdvanceAndNextBatter = (eventType, addedOuts = 0) => {
        setGameState(prev => {
          let newOuts = prev.outs + addedOuts;
          let newInning = prev.inning;
          let newIsTop = prev.isTop;
          let newBatterTop = prev.batterTop;
          let newBatterBottom = prev.batterBottom;
          let newRunners = { ...prev.runners };
          let newRunsArray = [...prev.runs[prev.isTop ? 'top' : 'bottom']];
          let runScored = 0;

          if (newOuts < 3) {
            if (eventType === 'walk' || eventType === 'other') {
              if (newRunners.first && newRunners.second && newRunners.third) runScored = 1;
              else if (newRunners.first && newRunners.second) newRunners.third = true;
              else if (newRunners.first) newRunners.second = true;
              newRunners.first = true;
            } else if (['single', 'error'].includes(eventType)) {
              if (newRunners.third) runScored++;
              newRunners.third = newRunners.second;
              newRunners.second = newRunners.first;
              newRunners.first = true;
            } else if (eventType === 'double') {
              if (newRunners.third) runScored++;
              if (newRunners.second) runScored++;
              newRunners.third = newRunners.first;
              newRunners.second = true;
              newRunners.first = false;
            } else if (eventType === 'triple') {
              if (newRunners.third) runScored++;
              if (newRunners.second) runScored++;
              if (newRunners.first) runScored++;
              newRunners.third = true;
              newRunners.second = false;
              newRunners.first = false;
            } else if (eventType === 'homerun') {
              if (newRunners.third) runScored++;
              if (newRunners.second) runScored++;
              if (newRunners.first) runScored++;
              runScored++; 
              newRunners = { first: false, second: false, third: false };
            }
          }

          if (runScored > 0) newRunsArray[newInning - 1] += runScored;

          if (prev.isTop) newBatterTop = newBatterTop === 9 ? 1 : newBatterTop + 1;
          else newBatterBottom = newBatterBottom === 9 ? 1 : newBatterBottom + 1;

          let nextRuns = { ...prev.runs, [prev.isTop ? 'top' : 'bottom']: newRunsArray };

          if (newOuts >= 3) {
            newOuts = 0;
            newRunners = { first: false, second: false, third: false }; 
            if (prev.isTop) newIsTop = false;
            else { newIsTop = true; newInning++; }
          }
          return { ...prev, outs: newOuts, balls: 0, strikes: 0, batterTop: newBatterTop, batterBottom: newBatterBottom, inning: newInning, isTop: newIsTop, runners: newRunners, runs: nextRuns };
        });
        setShowInPlayResult(false);
        setSelectedPosition(null);
        setSelectedFielder(null);
      };

      const handleAdvanceRecord = () => {
        if (!advanceData.runner || !advanceData.reason || !advanceData.to) {
          showToast("全ての項目を選択してください", "error"); 
          return;
        }
        recordAction();
        
        const runnerName = advanceData.runner === 'first' ? '1塁走者' : advanceData.runner === 'second' ? '2塁走者' : '3塁走者';
        const toName = advanceData.to === 'second' ? '2塁' : advanceData.to === 'third' ? '3塁' : advanceData.to === 'same' ? 'そのまま' : '本塁';
        
        let resultText = `${runnerName} ${advanceData.reason}で${toName}へ`;
        if (advanceData.reason === '代走') {
            resultText = `${runnerName} に代走`;
        } else if (advanceData.to === 'same') {
            resultText = `${runnerName} ${advanceData.reason}`;
        }
        
        const defTeamKey = gameState.isTop ? 'bottom' : 'top';
        const offTeamKey = gameState.isTop ? 'top' : 'bottom';
        const currentBatterIndex = (gameState.isTop ? gameState.batterTop : gameState.batterBottom) - 1;
        const currentPitcherObj = lineups[defTeamKey].find(p => p.pos === '投' || p.pos === '1' || p.pos === '①') || { name: '投手未設定', throws: '右' };
        const currentBatterObj = lineups[offTeamKey][currentBatterIndex] || { name: '打者未設定', bats: '右' };

        const eventPitch = {
          course: null, type: '-', result: resultText,
          inning: gameState.inning, isTop: gameState.isTop, batter: currentBatterIndex + 1,
          pitchNumber: '-', pitcherName: currentPitcherObj.name, pitcherThrows: currentPitcherObj.throws,
          batterName: currentBatterObj.name, batterBats: currentBatterObj.bats, isEvent: true,
          runners: { ...gameState.runners }, outs: gameState.outs
        };
        setPitches([...pitches, eventPitch]);

        setGameState(prev => {
          const newRunners = { ...prev.runners };
          if (advanceData.to !== 'same') {
            newRunners[advanceData.runner] = false;
            if (advanceData.to !== 'home') newRunners[advanceData.to] = true;
          }
          const newRuns = { ...prev.runs };
          if (advanceData.to === 'home') {
              const team = prev.isTop ? 'top' : 'bottom';
              const newRunsArray = [...newRuns[team]];
              newRunsArray[prev.inning - 1]++;
              newRuns[team] = newRunsArray;
          }
          return { ...prev, runners: newRunners, runs: newRuns };
        });

        setShowAdvanceModal(false);
        setAdvanceData({ runner: '', reason: '', to: '' });
      };

      const handleOutRunnerRecord = () => {
        if (!outRunnerData.runner || !outRunnerData.reason) {
          showToast("走者を選択してください", "error"); 
          return;
        }
        recordAction();
        
        const runnerName = outRunnerData.runner === 'first' ? '1塁走者' : outRunnerData.runner === 'second' ? '2塁走者' : '3塁走者';
        
        const defTeamKey = gameState.isTop ? 'bottom' : 'top';
        const offTeamKey = gameState.isTop ? 'top' : 'bottom';
        const currentBatterIndex = (gameState.isTop ? gameState.batterTop : gameState.batterBottom) - 1;
        const currentPitcherObj = lineups[defTeamKey].find(p => p.pos === '投' || p.pos === '1' || p.pos === '①') || { name: '投手未設定', throws: '右' };
        const currentBatterObj = lineups[offTeamKey][currentBatterIndex] || { name: '打者未設定', bats: '右' };

        const eventPitch = {
          course: null, type: '-', result: `${runnerName}が${outRunnerData.reason}`,
          inning: gameState.inning, isTop: gameState.isTop, batter: currentBatterIndex + 1,
          pitchNumber: '-', pitcherName: currentPitcherObj.name, pitcherThrows: currentPitcherObj.throws,
          batterName: currentBatterObj.name, batterBats: currentBatterObj.bats, isEvent: true,
          runners: { ...gameState.runners }, outs: gameState.outs
        };
        setPitches([...pitches, eventPitch]);

        setGameState(prev => {
          let newOuts = prev.outs + 1;
          let newRunners = { ...prev.runners, [outRunnerData.runner]: false };
          let newInning = prev.inning;
          let newIsTop = prev.isTop;

          if (newOuts >= 3) {
            newOuts = 0;
            newRunners = { first: false, second: false, third: false }; 
            if (prev.isTop) newIsTop = false;
            else { newIsTop = true; newInning++; }
          }

          return { ...prev, outs: newOuts, inning: newInning, isTop: newIsTop, runners: newRunners };
        });

        setShowOutRunnerModal(false);
        setOutRunnerData({ runner: '', reason: '盗塁死' });
      };

      const recordPitch = (result, detailedResult = '') => {
        if (result !== '牽制' && result !== 'その他出塁' && result !== 'ウエスト' && result !== '死球' && currentPitch.course === null) {
          showToast("先にコース（ストライクゾーンの図）をタップして選択してください！", "error");
          return;
        }
        recordAction(); 

        const defTeamKey = gameState.isTop ? 'bottom' : 'top';
        const offTeamKey = gameState.isTop ? 'top' : 'bottom';
        const currentBatterIndex = (gameState.isTop ? gameState.batterTop : gameState.batterBottom) - 1;
        
        const currentPitcherObj = lineups[defTeamKey].find(p => p.pos === '投' || p.pos === '1' || p.pos === '①') || { name: '投手未設定', throws: '右' };
        const currentBatterObj = lineups[offTeamKey][currentBatterIndex] || { name: '打者未設定', bats: '右' };

        const currentBatterPitches = pitches.filter(p => p.inning === gameState.inning && p.isTop === gameState.isTop && p.batter === currentBatterIndex + 1 && !p.isEvent);

        const newPitch = {
          ...currentPitch,
          course: (result === '牽制' || result === 'その他出塁' || result === 'ウエスト') ? null : currentPitch.course,
          type: (result === '牽制' || result === 'その他出塁') ? '-' : currentPitch.type,
          result: detailedResult || result,
          inning: gameState.inning,
          isTop: gameState.isTop,
          batter: currentBatterIndex + 1,
          pitchNumber: currentBatterPitches.length + 1,
          pitcherName: currentPitcherObj.name,
          pitcherThrows: currentPitcherObj.throws,
          batterName: currentBatterObj.name,
          batterBats: currentBatterObj.bats,
          isEvent: false,
          runners: { ...gameState.runners },
          outs: gameState.outs
        };

        setPitches([...pitches, newPitch]);

        if (result === '牽制') { setCurrentPitch(p => ({ ...p, course: null })); return; }

        if (result === 'ストライク' || result === '空振り') {
          if (gameState.strikes === 2) handleAdvanceAndNextBatter('out', 1);
          else setGameState(prev => ({ ...prev, strikes: prev.strikes + 1 }));
        } else if (result === 'ファウル') {
          if (gameState.strikes < 2) setGameState(prev => ({ ...prev, strikes: prev.strikes + 1 }));
        } else if (result === 'ボール' || result === 'ウエスト') {
          if (gameState.balls === 3) handleAdvanceAndNextBatter('walk', 0);
          else setGameState(prev => ({ ...prev, balls: prev.balls + 1 }));
        } else if (result === '死球' || result === 'その他出塁') {
          handleAdvanceAndNextBatter(result === 'その他出塁' ? 'other' : 'walk', 0); 
        } else if (result === 'インプレー') {
          setShowInPlayResult(true);
        }
        setCurrentPitch(p => ({ ...p, course: null }));
      };

      const handleInPlayFinalResult = (typeLabel, outCount) => {
        recordAction();
        const fullResult = `${selectedPosition}${typeLabel}`;
        setPitches(prev => {
          const newPitches = [...prev];
          if (newPitches.length > 0) newPitches[newPitches.length - 1] = { ...newPitches[newPitches.length - 1], result: fullResult };
          return newPitches;
        });

        let eventType = 'out';
        if (typeLabel === '安') eventType = 'single';
        else if (typeLabel === '二塁打') eventType = 'double';
        else if (typeLabel === '三塁打') eventType = 'triple';
        else if (typeLabel === '本塁打') eventType = 'homerun';
        else if (typeLabel === 'エラー' || typeLabel === '敵失(エラー)' || typeLabel === '野手選択') eventType = 'error';

        handleAdvanceAndNextBatter(eventType, outCount);
      };

      const changeScore = (team, delta) => {
        recordAction();
        setGameState(prev => {
          const newRuns = [...prev.runs[team]];
          newRuns[prev.inning - 1] = Math.max(0, newRuns[prev.inning - 1] + delta);
          return { ...prev, runs: { ...prev.runs, [team]: newRuns } };
        });
      };

      const manuallyChangeBatter = (newBatterNum) => {
        recordAction();
        const targetPitches = pitches.filter(p => p.inning === gameState.inning && p.isTop === gameState.isTop && p.batter === newBatterNum);
        
        setGameState(prev => {
          let newRunners = { first: false, second: false, third: false };
          let newOuts = prev.outs;
          let newBalls = 0;
          let newStrikes = 0;
          
          if (targetPitches.length > 0) {
            const lastPitch = targetPitches[targetPitches.length - 1];
            newRunners = lastPitch.runners || newRunners;
            newOuts = lastPitch.outs || 0;

            const nonEventPitches = targetPitches.filter(p => !p.isEvent);
            for (let p of nonEventPitches) {
              if (p.result === 'ボール' || p.result === 'ウエスト') newBalls++;
              else if (p.result === 'ストライク' || p.result === '空振り') newStrikes++;
              else if (p.result === 'ファウル' && newStrikes < 2) newStrikes++;
            }
          }

          return {
            ...prev,
            ...(prev.isTop ? { batterTop: newBatterNum } : { batterBottom: newBatterNum }),
            runners: newRunners,
            outs: newOuts,
            balls: newBalls,
            strikes: newStrikes
          };
        });
        setShowInPlayResult(false);
        setSelectedPosition(null);
        setSelectedFielder(null); 
      };

      const updatePlayerInfo = (team, index, field, value) => {
        if (index < 0) return;
        const newLineups = { ...lineups };
        newLineups[team][index][field] = value;
        setLineups(newLineups);
      };

      const handleEditPitchClick = (pitch) => {
        const globalIndex = pitches.indexOf(pitch);
        if (globalIndex !== -1) {
          setEditingPitchIndex(globalIndex);
          setEditPitchData({ 
            ...pitch, 
            runners: pitch.runners || { first: false, second: false, third: false } 
          });
        }
      };

      const savePitchEdit = () => {
        recordAction();
        const newPitches = [...pitches];
        newPitches[editingPitchIndex] = editPitchData;
        setPitches(newPitches);
        setEditingPitchIndex(null);
        setEditPitchData(null);
      };

      const cancelPitchEdit = () => {
        setEditingPitchIndex(null);
        setEditPitchData(null);
      };

      const toggleEditRunner = (base) => {
        setEditPitchData(prev => ({
          ...prev,
          runners: { ...prev.runners, [base]: !prev.runners[base] }
        }));
      };

      // 投球ごとのカウント状態 (ahead, even, behind) を事前計算する
      const pitchesWithCountState = useMemo(() => {
         const result = [];
         let currentAbKey = null;
         let b = 0, s = 0;
         pitches.forEach(p => {
             if (p.isEvent || p.result === '牽制' || p.result === '盗塁死' || p.result === 'その他出塁') {
                 result.push({...p, countState: 'even'});
                 return;
             }
             
             const key = `${p.inning}-${p.isTop}-${p.batter}`;
             if (currentAbKey !== key) {
                 currentAbKey = key;
                 b = 0;
                 s = 0;
             }
             
             let countState = 'even';
             if (s > b) countState = 'ahead'; // 投手有利
             else if (b > s) countState = 'behind'; // 打者有利
             
             result.push({...p, countState});
             
             // 次の球のためにカウントを更新
             if (p.result === 'ボール' || p.result === 'ウエスト') b++;
             else if (p.result === 'ストライク' || p.result === '空振り') s++;
             else if (p.result === 'ファウル' && s < 2) s++;
         });
         return result;
      }, [pitches]);

      // --- 導出データとUIコンポーネント ---
      const offTeamKey = gameState.isTop ? 'top' : 'bottom';
      const defTeamKey = gameState.isTop ? 'bottom' : 'top';
      const currentBatterIndex = (gameState.isTop ? gameState.batterTop : gameState.batterBottom) - 1;
      const currentBatterObj = lineups[offTeamKey][currentBatterIndex] || { name: '打者未設定', bats: '右' };
      const currentPitcherIdx = lineups[defTeamKey].findIndex(p => p.pos === '投' || p.pos === '1' || p.pos === '①');
      const currentPitcherObj = currentPitcherIdx !== -1 ? lineups[defTeamKey][currentPitcherIdx] : { name: '投手未設定', throws: '右' };

      // 16分割の打球方向データ
      const fieldPositions = [
        { label: '左翼線', arrow: '⇖', top: '32%', left: '2%' },
        { label: 'レフト', arrow: '↖', top: '15%', left: '10%' },
        { label: '左中間', arrow: '↖', top: '4%', left: '25%' },
        { label: 'センター', arrow: '⬆', top: '1%', left: '50%', center: true },
        { label: '右中間', arrow: '↗', top: '4%', right: '25%' },
        { label: 'ライト', arrow: '↗', top: '15%', right: '10%' },
        { label: '右翼線', arrow: '⇗', top: '32%', right: '2%' },
        
        { label: '三遊間', arrow: '⬅', top: '48%', left: '14%' },
        { label: 'ショート', arrow: '↖', top: '40%', left: '28%' },
        { label: '二遊間', arrow: '⬆', top: '36%', left: '50%', center: true },
        { label: 'セカンド', arrow: '↗', top: '40%', right: '28%' },
        { label: '一二間', arrow: '➡', top: '48%', right: '14%' },

        { label: 'サード', arrow: '↙', top: '65%', left: '20%' },
        { label: 'ピッチャー', arrow: '⬇', top: '56%', left: '50%', center: true },
        { label: 'ファースト', arrow: '↘', top: '65%', right: '20%' },
        
        { label: 'キャッチャー', arrow: '⬇', top: '85%', left: '50%', center: true },
      ];

      const analysisData = useMemo(() => {
        const valid = pitchesWithCountState.filter(p => {
          if (p.isEvent || p.result === '牽制' || p.result === '盗塁死' || p.result === 'その他出塁') return false;
          if (analysisFilter.pitcher !== 'ALL' && p.pitcherName !== analysisFilter.pitcher) return false;
          if (analysisFilter.batterSide !== 'ALL' && p.batterBats !== analysisFilter.batterSide) return false;
          return true;
        });
        
        const makeHeatmapBucket = () => ({ all: {}, ahead: {}, even: {}, behind: {}, max: {all:0, ahead:0, even:0, behind:0} });
        
        const heatmaps = {
            all: makeHeatmapBucket(),
            fastball: makeHeatmapBucket(),
            breaking: makeHeatmapBucket()
        };
        
        // 球種個別ヒートマップ用
        const pitchTypeHeatmaps = {};

        const addToHeatmap = (bucket, course, countState) => {
          bucket.all[course] = (bucket.all[course] || 0) + 1;
          if (bucket.all[course] > bucket.max.all) bucket.max.all = bucket.all[course];
          bucket[countState][course] = (bucket[countState][course] || 0) + 1;
          if (bucket[countState][course] > bucket.max[countState]) bucket.max[countState] = bucket[countState][course];
        };

        valid.forEach(p => { 
          if (p.course !== null) { 
            const c = p.course;
            const cs = p.countState;
            const isFast = p.type && (p.type.includes('ストレート') || p.type.includes('シュート'));
            const typeKey = isFast ? 'fastball' : 'breaking';
            const normalizedType = p.type ? p.type.replace(/系$/, '') : '不明';

            addToHeatmap(heatmaps.all, c, cs);
            addToHeatmap(heatmaps[typeKey], c, cs);
            
            // 球種個別
            if (!pitchTypeHeatmaps[normalizedType]) pitchTypeHeatmaps[normalizedType] = makeHeatmapBucket();
            addToHeatmap(pitchTypeHeatmaps[normalizedType], c, cs);
          } 
        });
        
        const typeCount = {}; 
        valid.forEach(p => { 
          const normalizedType = p.type ? p.type.replace(/系$/, '') : '不明';
          typeCount[normalizedType] = (typeCount[normalizedType] || 0) + 1; 
        });
        
        const strikeRate = valid.length === 0 ? 0 : Math.round((valid.filter(p => p.result !== 'ボール' && p.result !== 'ウエスト').length / valid.length) * 100);
        return { heatmaps, pitchTypeHeatmaps, typeCount, strikeRate, totalPitches: valid.length };
      }, [pitchesWithCountState, analysisFilter]);

      const uniquePitchers = useMemo(() => Array.from(new Set(pitches.map(p => p.pitcherName).filter(Boolean))), [pitches]);
      const currentAtBatPitches = pitches.filter(p => p.inning === gameState.inning && p.isTop === gameState.isTop && p.batter === currentBatterIndex + 1);

      const courses = Array.from({ length: 25 }, (_, i) => i);
      const isStrikeZone = (i) => { const row = Math.floor(i / 5); const col = i % 5; return row >= 1 && row <= 3 && col >= 1 && col <= 3; };
      
      const getPitchTypes = (throwsRight) => [
        { name: 'ストレート', icon: '↑', colorClass: 'border-red-500 bg-red-100 text-red-700' }, 
        { name: 'スライダー', icon: throwsRight ? '→' : '←', colorClass: 'border-blue-500 bg-blue-100 text-blue-700' }, 
        { name: 'シュート', icon: throwsRight ? '←' : '→', colorClass: 'border-green-500 bg-green-100 text-green-700' },
        { name: 'カーブ', icon: throwsRight ? '↘' : '↙', colorClass: 'border-yellow-500 bg-yellow-100 text-yellow-700' }, 
        { name: '落ちる球', icon: '↓', colorClass: 'border-purple-500 bg-purple-100 text-purple-700' }, 
        { name: 'シンカー', icon: throwsRight ? '↙' : '↘', colorClass: 'border-cyan-500 bg-cyan-100 text-cyan-700' }
      ];

      const PitchTypeButton = ({ pt, isEditing = false }) => {
        const stateObj = isEditing ? editPitchData : currentPitch;
        const setStateObj = isEditing ? setEditPitchData : setCurrentPitch;
        const isActive = stateObj.type === pt.name;
        return (
          <button 
            onClick={() => setStateObj({...stateObj, type: pt.name})} 
            className={`flex flex-col items-center justify-center py-1 border-2 rounded-xl transition-all ${isActive ? `${pt.colorClass} shadow-md scale-105` : 'border-slate-300 bg-white text-slate-600 hover:bg-slate-50'}`}
          >
            <span className="text-xl font-black leading-none mt-1">{pt.icon}</span>
            <span className="text-[9px] font-bold mt-1">{pt.name}</span>
          </button>
        );
      };

      const PawapuroPitchGrid = ({ isEditing = false, throwsRight = true }) => {
        const pTypes = getPitchTypes(throwsRight);
        const leftPitch = throwsRight ? pTypes[2] : pTypes[1]; 
        const rightPitch = throwsRight ? pTypes[1] : pTypes[2]; 
        const bottomLeftPitch = throwsRight ? pTypes[5] : pTypes[3]; 
        const bottomRightPitch = throwsRight ? pTypes[3] : pTypes[5];

        return (
          <div className="grid grid-cols-3 grid-rows-3 gap-1.5 w-full max-w-[220px] mx-auto mb-4">
            <div></div>
            <PitchTypeButton pt={pTypes[0]} isEditing={isEditing} />
            <div></div>

            <PitchTypeButton pt={leftPitch} isEditing={isEditing} />
            <div className="flex flex-col items-center justify-center text-[9px] font-bold text-slate-400 bg-slate-50 rounded-xl border border-slate-200">
              <span className={throwsRight ? "text-red-500 text-xs" : "text-blue-500 text-xs"}>{throwsRight ? "右投" : "左投"}</span>
              <span className="text-slate-700">捕手目線</span>
            </div>
            <PitchTypeButton pt={rightPitch} isEditing={isEditing} />

            <PitchTypeButton pt={bottomLeftPitch} isEditing={isEditing} />
            <PitchTypeButton pt={pTypes[4]} isEditing={isEditing} />
            <PitchTypeButton pt={bottomRightPitch} isEditing={isEditing} />
          </div>
        );
      }

      // スプレーチャートSVGコンポーネント
      const SprayChart = ({ hits, size = 200, title = '', color = 'blue' }) => {
        const scale = size / 200;
        const jitter = () => (Math.random() - 0.5) * 8;
        return (
          <div className="flex flex-col items-center">
            {title && <div className="text-[10px] font-bold text-slate-400 mb-1">{title}</div>}
            <svg width={size} height={size * 0.8} viewBox="0 0 200 160" className="bg-slate-900 rounded-lg border border-slate-700">
              {/* フィールド描画 */}
              <path d="M 100 145 L 15 50 Q 100 -15 185 50 Z" fill="#1a3a1a" stroke="#334155" strokeWidth="1.5" />
              {/* 内野ダイヤモンド */}
              <polygon points="100,130 65,90 100,60 135,90" fill="none" stroke="#475569" strokeWidth="1" strokeDasharray="3,3" />
              {/* 本塁 */}
              <rect x="97" y="128" width="6" height="6" fill="#94a3b8" transform="rotate(45,100,131)" />
              {/* 打球プロット */}
              {hits.map((h, idx) => {
                const cx = h.x + jitter();
                const cy = h.y + jitter();
                const fillColor = h.type === 'hit' ? '#3b82f6' : h.type === 'error' ? '#facc15' : '#ef4444';
                const strokeColor = h.type === 'hit' ? '#93c5fd' : h.type === 'error' ? '#fde68a' : '#fca5a5';
                return (
                  <g key={idx}>
                    <circle cx={cx} cy={cy} r="5" fill={fillColor} stroke={strokeColor} strokeWidth="1.5" opacity="0.85" />
                    {h.type === 'hit' && <circle cx={cx} cy={cy} r="5" fill="none" stroke="#93c5fd" strokeWidth="0.8" opacity="0.5" />}
                  </g>
                );
              })}
              {hits.length === 0 && <text x="100" y="80" textAnchor="middle" fill="#475569" fontSize="11" fontWeight="bold">No Data</text>}
            </svg>
            <div className="flex gap-3 mt-1.5">
              <div className="flex items-center gap-1"><div className="w-2.5 h-2.5 rounded-full bg-blue-500"></div><span className="text-[9px] text-slate-400">安打</span></div>
              <div className="flex items-center gap-1"><div className="w-2.5 h-2.5 rounded-full bg-red-500"></div><span className="text-[9px] text-slate-400">アウト</span></div>
              <div className="flex items-center gap-1"><div className="w-2.5 h-2.5 rounded-full bg-yellow-400"></div><span className="text-[9px] text-slate-400">エラー</span></div>
            </div>
          </div>
        );
      };

      // --- 大幅アップグレード：チーム＆個人分析データ ---
      const advancedStats = useMemo(() => {
        if (!showPostGameAnalysis) return null;
        
        const getHitDirection = (res) => {
          if (res.includes('レフト') || res.includes('サード') || res.includes('ショート') || res.includes('左翼線') || res.includes('三遊間')) return 'left';
          if (res.includes('ライト') || res.includes('ファースト') || res.includes('セカンド') || res.includes('右翼線') || res.includes('一二間')) return 'right';
          if (res.includes('センター') || res.includes('ピッチャー') || res.includes('キャッチャー') || res.includes('左中間') || res.includes('右中間') || res.includes('二遊間')) return 'center';
          
          if (res.match(/[左三遊]/)) return 'left';
          if (res.match(/[右一二]/)) return 'right';
          if (res.match(/[中投捕]/)) return 'center';
          return null;
        };

        // スプレーチャート用の詳細方向 → フィールド座標 (SVG 200x200, 原点=本塁下中央)
        const sprayCoordMap = {
          '左翼線':   { x: 18, y: 42 },
          'レフト':   { x: 30, y: 25 },
          '左中間':   { x: 55, y: 14 },
          'センター': { x: 100, y: 10 },
          '右中間':   { x: 145, y: 14 },
          'ライト':   { x: 170, y: 25 },
          '右翼線':   { x: 182, y: 42 },
          '三遊間':   { x: 42, y: 72 },
          'ショート': { x: 58, y: 60 },
          '二遊間':   { x: 100, y: 55 },
          'セカンド': { x: 142, y: 60 },
          '一二間':   { x: 158, y: 72 },
          'サード':   { x: 48, y: 95 },
          'ピッチャー':{ x: 100, y: 85 },
          'ファースト':{ x: 152, y: 95 },
          'キャッチャー':{ x: 100, y: 135 },
        };

        const getSprayPosition = (res) => {
          for (const [key, coord] of Object.entries(sprayCoordMap)) {
            if (res.includes(key)) return coord;
          }
          // フォールバック: 漢字マッチ
          if (res.match(/左翼線/)) return sprayCoordMap['左翼線'];
          if (res.match(/三遊間/)) return sprayCoordMap['三遊間'];
          if (res.match(/一二間/)) return sprayCoordMap['一二間'];
          if (res.match(/右翼線/)) return sprayCoordMap['右翼線'];
          if (res.match(/左中間/)) return sprayCoordMap['左中間'];
          if (res.match(/右中間/)) return sprayCoordMap['右中間'];
          if (res.match(/二遊間/)) return sprayCoordMap['二遊間'];
          if (res.match(/左/)) return sprayCoordMap['レフト'];
          if (res.match(/三/)) return sprayCoordMap['サード'];
          if (res.match(/遊/)) return sprayCoordMap['ショート'];
          if (res.match(/中/)) return sprayCoordMap['センター'];
          if (res.match(/右/)) return sprayCoordMap['ライト'];
          if (res.match(/一/)) return sprayCoordMap['ファースト'];
          if (res.match(/二/)) return sprayCoordMap['セカンド'];
          if (res.match(/投/)) return sprayCoordMap['ピッチャー'];
          if (res.match(/捕/)) return sprayCoordMap['キャッチャー'];
          return null;
        };

        const getSprayResultType = (res) => {
          if (['安', '塁打', '本塁打'].some(w => res.includes(w))) return 'hit';
          if (res.includes('エラー') || res.includes('野手選択')) return 'error';
          return 'out';
        };

        const isFastball = (type) => type && (type.includes('ストレート') || type.includes('シュート'));

        const getAtBats = (isTopQuery) => {
            const abs = [];
            let currentAb = [];
            const teamPitches = pitchesWithCountState.filter(p => p.isTop === isTopQuery && !p.isEvent && p.result !== '牽制' && p.result !== '盗塁死' && p.result !== 'その他出塁');
            
            teamPitches.forEach(p => {
                if (p.pitchNumber === 1 && currentAb.length > 0) {
                    abs.push(currentAb);
                    currentAb = [];
                }
                currentAb.push(p);
            });
            if (currentAb.length > 0) abs.push(currentAb);
            return abs;
        };

        const calcBatting = (isTopQuery) => {
          const abs = getAtBats(isTopQuery);
          
          const teamStats = { 
            PA: 0, AB: 0, H: 0, TB: 0, BB_HBP: 0, K: 0, SAC: 0, SB: 0,
            firstPitches: 0, firstPitchSwings: 0, 
            directions: { left: 0, center: 0, right: 0 },
            fastball: { AB: 0, H: 0 }, breaking: { AB: 0, H: 0 },
            sprayHits: []
          };
          
          const playerStats = {};
          
          const teamLineup = isTopQuery ? lineups.top : lineups.bottom;
          teamLineup.forEach((p, i) => {
            const key = `${i + 1}-${p.name}`; 
            playerStats[key] = { 
              order: i + 1, name: p.name, pos: p.pos, bats: p.bats,
              PA: 0, AB: 0, H: 0, TB: 0, BB_HBP: 0, K: 0, SAC: 0, SB: 0, results: [],
              firstPitches: 0, firstPitchSwings: 0, 
              directions: { left: 0, center: 0, right: 0 },
              sprayHits: []
            };
          });

          const teamEvents = pitches.filter(p => p.isTop === isTopQuery && p.isEvent);
          teamEvents.forEach(p => {
            if (p.result.includes('盗塁で')) teamStats.SB++;
          });

          abs.forEach(ab => {
            const lastPitch = ab[ab.length - 1];
            if (!lastPitch) return;
            
            const batterKey = `${lastPitch.batter}-${lastPitch.batterName}`;
            if (!playerStats[batterKey]) {
              playerStats[batterKey] = { 
                order: lastPitch.batter, name: lastPitch.batterName, pos: '途中', bats: lastPitch.batterBats,
                PA: 0, AB: 0, H: 0, TB: 0, BB_HBP: 0, K: 0, SAC: 0, SB: 0, results: [],
                firstPitches: 0, firstPitchSwings: 0,
                directions: { left: 0, center: 0, right: 0 },
                sprayHits: []
              };
            }
            
            const pStat = playerStats[batterKey];
            const res = lastPitch.result;

            teamStats.PA++;
            pStat.PA++;
            
            if (ab.length > 0) {
              const firstPitch = ab[0];
              pStat.firstPitches++;
              teamStats.firstPitches++;
              const fRes = firstPitch.result;
              const isFSwing = fRes.includes('空振り') || fRes === 'ファウル' || fRes === 'インプレー' || ['ゴロ', '飛', '直', '安', '塁打', 'エラー', '犠'].some(w => fRes.includes(w));
              if (isFSwing) {
                pStat.firstPitchSwings++;
                teamStats.firstPitchSwings++;
              }
            }

            let s = 0, b = 0;
            for (let p of ab) {
              if (p.result === 'ボール' || p.result === 'ウエスト') b++;
              else if (p.result === 'ストライク' || p.result === '空振り') s++;
              else if (p.result === 'ファウル' && s < 2) s++;
            }

            const isHitPlay = ['安', '塁打', '本塁打'].some(w => res.includes(w));
            let isAB = true;
            let tbAdded = 0;
            
            if (isHitPlay) {
               teamStats.H++; pStat.H++;
               if (res.includes('二塁打')) tbAdded = 2;
               else if (res.includes('三塁打')) tbAdded = 3;
               else if (res.includes('本塁打')) tbAdded = 4;
               else tbAdded = 1;
               teamStats.TB += tbAdded; pStat.TB += tbAdded;
            } else if (res === '死球' || res === '四球' || res === 'ウエスト' || b >= 4) {
               teamStats.BB_HBP++; pStat.BB_HBP++;
               isAB = false;
            } else if (res.includes('犠打') || res.includes('犠飛')) {
               teamStats.SAC++; pStat.SAC++;
               isAB = false;
            } else {
               if (res === '三振' || s >= 3) {
                 teamStats.K++; pStat.K++;
               }
            }

            if (isAB) {
              teamStats.AB++; pStat.AB++;
              if (isFastball(lastPitch.type)) {
                teamStats.fastball.AB++;
                if (isHitPlay) teamStats.fastball.H++;
              } else {
                teamStats.breaking.AB++;
                if (isHitPlay) teamStats.breaking.H++;
              }
            }

            if (isHitPlay || res.includes('ゴロ') || res.includes('飛') || res.includes('直') || res.includes('エラー')) {
              const dir = getHitDirection(res);
              if (dir) {
                teamStats.directions[dir]++;
                pStat.directions[dir]++;
              }
              // スプレーチャート用データ
              const sprayPos = getSprayPosition(res);
              if (sprayPos) {
                const sprayEntry = { ...sprayPos, type: getSprayResultType(res), result: res, batter: lastPitch.batterName };
                teamStats.sprayHits.push(sprayEntry);
                pStat.sprayHits.push(sprayEntry);
              }
            }

            if (!res.includes('牽制') && !res.includes('盗塁死') && res !== 'その他出塁') {
              pStat.results.push(res);
            }
          });

          const calcRates = (stat) => {
            const AVG = stat.AB > 0 ? (stat.H / stat.AB).toFixed(3).replace(/^0/, '') : '.000';
            const OBP = stat.PA > 0 ? ((stat.H + stat.BB_HBP) / stat.PA).toFixed(3).replace(/^0/, '') : '.000';
            const SLG = stat.AB > 0 ? (stat.TB / stat.AB).toFixed(3).replace(/^0/, '') : '.000';
            const OPS = (parseFloat(OBP || 0) + parseFloat(SLG || 0)).toFixed(3).replace(/^0/, '');
            
            const KPct = stat.PA > 0 ? Math.round((stat.K / stat.PA) * 100) : 0;
            const BBPct = stat.PA > 0 ? Math.round((stat.BB_HBP / stat.PA) * 100) : 0;
            const FirstSwingPct = stat.firstPitches > 0 ? Math.round((stat.firstPitchSwings / stat.firstPitches) * 100) : 0;
            
            return { AVG, OBP, SLG, OPS, KPct, BBPct, FirstSwingPct };
          };

          Object.assign(teamStats, calcRates(teamStats));

          const playersArray = Object.values(playerStats).map(p => ({
            ...p, ...calcRates(p)
          })).sort((a, b) => {
            if (a.order !== b.order) return a.order - b.order;
            const isSubA = ['途中', '打', '走', '代'].includes(a.pos);
            const isSubB = ['途中', '打', '走', '代'].includes(b.pos);
            if (isSubA && !isSubB) return 1;
            if (!isSubA && isSubB) return -1;
            return 0; 
          });

          return { team: teamStats, players: playersArray };
        };

        const topBatting = calcBatting(true);
        const bottomBatting = calcBatting(false);

        const calcTeamPitching = (isTopQuery) => {
          const validPitches = pitchesWithCountState.filter(p => p.isTop === isTopQuery && !p.isEvent && p.result !== '牽制' && p.result !== '盗塁死' && p.result !== 'その他出塁');
          
          const pStats = {};
          let totalOverall = 0, calledStrikesOverall = 0, whiffsOverall = 0, swingsOverall = 0, inZoneOverall = 0;
          let firstPitchesOverall = 0, firstStrikesOverall = 0;

          validPitches.forEach(p => {
              const pName = p.pitcherName || '不明';
              if (!pStats[pName]) {
                pStats[pName] = { 
                  name: pName, total: 0, calledStrikes: 0, whiffs: 0, swings: 0, inZone: 0, strikes: 0,
                  firstPitches: 0, firstStrikes: 0,
                  H: 0, K: 0, BB: 0, PA: 0, throws: p.pitcherThrows || '右',
                  counts: {
                    vsRight: { ahead: { total: 0, strikes: 0, types: {} }, even: { total: 0, strikes: 0, types: {} }, behind: { total: 0, strikes: 0, types: {} } },
                    vsLeft: { ahead: { total: 0, strikes: 0, types: {} }, even: { total: 0, strikes: 0, types: {} }, behind: { total: 0, strikes: 0, types: {} } }
                  },
                  typeStats: {},
                  heatmaps: {
                      fastball: { all: {}, ahead: {}, even: {}, behind: {}, max: {all:0, ahead:0, even:0, behind:0} },
                      breaking: { all: {}, ahead: {}, even: {}, behind: {}, max: {all:0, ahead:0, even:0, behind:0} }
                  },
                  pitchTypeHeatmaps: {}
                };
              }
          });

          const allPitchesByAb = [];
          let currentAb = [];
          validPitches.forEach(p => {
            if (p.pitchNumber === 1 && currentAb.length > 0) {
              allPitchesByAb.push(currentAb);
              currentAb = [];
            }
            currentAb.push(p);
          });
          if (currentAb.length > 0) allPitchesByAb.push(currentAb);

          allPitchesByAb.forEach(ab => {
            let b = 0;
            let s = 0;
            ab.forEach(p => {
              totalOverall++;
              const pName = p.pitcherName || '不明';
              const st = pStats[pName];
              st.total++;

              const batterSide = p.batterBats === '左' ? 'vsLeft' : 'vsRight';
              const type = p.type ? p.type.replace(/系$/, '') : '不明';

              if (!st.typeStats[type]) {
                st.typeStats[type] = { total: 0, calledStrikes: 0, whiffs: 0, swings: 0, inZone: 0, strikes: 0 };
              }
              const tSt = st.typeStats[type];
              tSt.total++;

              const countState = p.countState || 'even'; 
              
              const targetCountObj = st.counts[batterSide][countState];
              targetCountObj.total++;
              if (!targetCountObj.types[type]) targetCountObj.types[type] = 0;
              targetCountObj.types[type]++;

              const isStrikeForRate = p.result !== 'ボール' && p.result !== 'ウエスト' && p.result !== '死球';
              if (isStrikeForRate) {
                st.strikes++;
                tSt.strikes++;
                targetCountObj.strikes++;
              }

              let isSwing = false;
              let isStrike = false;

              if (p.result.includes('見逃し') || p.result === 'ストライク') {
                st.calledStrikes++; tSt.calledStrikes++; calledStrikesOverall++; isStrike = true;
              } else if (p.result.includes('空振り')) {
                st.whiffs++; tSt.whiffs++; whiffsOverall++;
                isSwing = true; isStrike = true;
              } else if (p.result === 'ファウル' || p.result === 'インプレー' || ['ゴロ', '飛', '安', '塁打', 'エラー', '犠', '直'].some(w => p.result.includes(w))) {
                isSwing = true; isStrike = true;
              }

              if (isSwing) { st.swings++; tSt.swings++; swingsOverall++; }
              if (p.course !== null && isStrikeZone(p.course)) { st.inZone++; tSt.inZone++; inZoneOverall++; }

              if (p.pitchNumber === 1) {
                st.firstPitches++; firstPitchesOverall++;
                if (isStrike) { st.firstStrikes++; firstStrikesOverall++; }
              }

              if (p.course !== null) {
                 const isFast = p.type && (p.type.includes('ストレート') || p.type.includes('シュート'));
                 const typeKey = isFast ? 'fastball' : 'breaking';
                 const normalizedType = p.type ? p.type.replace(/系$/, '') : '不明';
                 
                 st.heatmaps[typeKey].all[p.course] = (st.heatmaps[typeKey].all[p.course] || 0) + 1;
                 if (st.heatmaps[typeKey].all[p.course] > st.heatmaps[typeKey].max.all) st.heatmaps[typeKey].max.all = st.heatmaps[typeKey].all[p.course];

                 st.heatmaps[typeKey][countState][p.course] = (st.heatmaps[typeKey][countState][p.course] || 0) + 1;
                 if (st.heatmaps[typeKey][countState][p.course] > st.heatmaps[typeKey].max[countState]) st.heatmaps[typeKey].max[countState] = st.heatmaps[typeKey][countState][p.course];
                 
                 // 球種個別ヒートマップ
                 if (!st.pitchTypeHeatmaps[normalizedType]) st.pitchTypeHeatmaps[normalizedType] = { all: {}, ahead: {}, even: {}, behind: {}, max: {all:0, ahead:0, even:0, behind:0} };
                 const ptH = st.pitchTypeHeatmaps[normalizedType];
                 ptH.all[p.course] = (ptH.all[p.course] || 0) + 1;
                 if (ptH.all[p.course] > ptH.max.all) ptH.max.all = ptH.all[p.course];
                 ptH[countState][p.course] = (ptH[countState][p.course] || 0) + 1;
                 if (ptH[countState][p.course] > ptH.max[countState]) ptH.max[countState] = ptH[countState][p.course];
              }

              if (p.result === 'ボール' || p.result === 'ウエスト') b++;
              else if (p.result === 'ストライク' || p.result === '空振り') s++;
              else if (p.result === 'ファウル' && s < 2) s++;
            });

            const lastPitch = ab[ab.length - 1];
            if (!lastPitch) return;
            const pName = lastPitch.pitcherName || '不明';
            const st = pStats[pName];
            if (st) {
              st.PA++;
              const res = lastPitch.result;
              let finalB = 0, finalS = 0;
              ab.forEach(p => {
                if (p.result === 'ボール' || p.result === 'ウエスト') finalB++;
                else if (p.result === 'ストライク' || p.result === '空振り') finalS++;
                else if (p.result === 'ファウル' && finalS < 2) finalS++;
              });
              
              if (['安', '塁打', '本塁打'].some(w => res.includes(w))) {
                st.H++;
              } else if (res === '死球' || res === '四球' || res === 'ウエスト' || finalB >= 4) {
                st.BB++;
              } else if (res === '三振' || finalS >= 3) {
                st.K++;
              }
            }
          });

          const calcCSW = (c, w, t) => t > 0 ? Math.round(((c + w) / t) * 100) : 0;
          const calcWhiff = (w, sw) => sw > 0 ? Math.round((w / sw) * 100) : 0;
          const calcZone = (z, t) => t > 0 ? Math.round((z / t) * 100) : 0;
          const calcStrikeRate = (s, t) => t > 0 ? Math.round((s / t) * 100) : 0;

          const pitchersArray = Object.values(pStats).map(st => {
            const typesArray = Object.entries(st.typeStats).map(([type, tSt]) => ({
              type,
              total: tSt.total,
              csw: calcCSW(tSt.calledStrikes, tSt.whiffs, tSt.total),
              whiff: calcWhiff(tSt.whiffs, tSt.swings),
              zone: calcZone(tSt.inZone, tSt.total),
              strikeRate: calcStrikeRate(tSt.strikes, tSt.total)
            })).sort((a, b) => b.total - a.total);

            return {
              ...st,
              csw: calcCSW(st.calledStrikes, st.whiffs, st.total),
              whiff: calcWhiff(st.whiffs, st.swings),
              zone: calcZone(st.inZone, st.total),
              fStrikePct: st.firstPitches > 0 ? Math.round((st.firstStrikes / st.firstPitches) * 100) : 0,
              pPa: st.PA > 0 ? (st.total / st.PA).toFixed(1) : '0.0',
              types: typesArray 
            };
          }).sort((a, b) => b.total - a.total);

          return {
            overall: {
              total: totalOverall,
              csw: calcCSW(calledStrikesOverall, whiffsOverall, totalOverall),
              whiff: calcWhiff(whiffsOverall, swingsOverall),
              zone: calcZone(inZoneOverall, totalOverall),
              fStrikePct: firstPitchesOverall > 0 ? Math.round((firstStrikesOverall / firstPitchesOverall) * 100) : 0,
              pPa: allPitchesByAb.length > 0 ? (totalOverall / allPitchesByAb.length).toFixed(1) : 0
            },
            pitchers: pitchersArray
          };
        };

        const pitchingTop = calcTeamPitching(false); 
        const pitchingBottom = calcTeamPitching(true); 

        return { topBatting, bottomBatting, pitchingTop, pitchingBottom };
      }, [pitchesWithCountState, showPostGameAnalysis, lineups]);

      // --- 複数試合横断 累積スタッツ ---
      const crossGameStats = useMemo(() => {
        if (!showCrossGameStats || !myTeam || savedGames.length === 0) return null;
        
        const teamName = myTeam.name;
        const batters = {};
        const pitcherStats = {};

        // sprayCoordMap (advancedStats内と同じ)
        const sprayCoordMap = {
          '左翼線': { x: 18, y: 42 }, 'レフト': { x: 30, y: 25 }, '左中間': { x: 55, y: 14 },
          'センター': { x: 100, y: 10 }, '右中間': { x: 145, y: 14 }, 'ライト': { x: 170, y: 25 },
          '右翼線': { x: 182, y: 42 }, '三遊間': { x: 42, y: 72 }, 'ショート': { x: 58, y: 60 },
          '二遊間': { x: 100, y: 55 }, 'セカンド': { x: 142, y: 60 }, '一二間': { x: 158, y: 72 },
          'サード': { x: 48, y: 95 }, 'ピッチャー': { x: 100, y: 85 }, 'ファースト': { x: 152, y: 95 },
          'キャッチャー': { x: 100, y: 135 },
        };
        const getSprayPos = (res) => { for (const [k, v] of Object.entries(sprayCoordMap)) { if (res.includes(k)) return v; } return null; };
        const getSprayType = (res) => { if (['安', '塁打', '本塁打'].some(w => res.includes(w))) return 'hit'; if (res.includes('エラー') || res.includes('野手選択')) return 'error'; return 'out'; };
        const isFastball = (type) => type && (type.includes('ストレート') || type.includes('シュート'));
        const isStrikeZoneFn = (c) => { const row = Math.floor(c / 5); const col = c % 5; return row >= 1 && row <= 3 && col >= 1 && col <= 3; };

        savedGames.forEach(game => {
          if (!game.data || !game.data.pitches) return;
          const gPitches = game.data.pitches;
          const gLineups = game.data.lineups;
          const gInfo = game.data.gameInfo || { teamTop: game.teamTop, teamBottom: game.teamBottom };
          
          const isMyTeamTop = gInfo.teamTop === teamName;
          const isMyTeamBottom = gInfo.teamBottom === teamName;
          if (!isMyTeamTop && !isMyTeamBottom) return;

          // --- 打者集計 ---
          const myBattingIsTop = isMyTeamTop;
          const validBatPitches = gPitches.filter(p => p.isTop === myBattingIsTop && !p.isEvent && p.result !== '牽制' && p.result !== '盗塁死' && p.result !== 'その他出塁');
          
          const absByBatter = {};
          let curAb = [];
          validBatPitches.forEach(p => {
            if (p.pitchNumber === 1 && curAb.length > 0) {
              const last = curAb[curAb.length - 1];
              const key = last.batterName;
              if (!absByBatter[key]) absByBatter[key] = [];
              absByBatter[key].push(curAb);
              curAb = [];
            }
            curAb.push(p);
          });
          if (curAb.length > 0) {
            const last = curAb[curAb.length - 1];
            if (!absByBatter[last.batterName]) absByBatter[last.batterName] = [];
            absByBatter[last.batterName].push(curAb);
          }

          Object.entries(absByBatter).forEach(([name, abs]) => {
            if (!batters[name]) batters[name] = { name, PA: 0, AB: 0, H: 0, TB: 0, BB_HBP: 0, K: 0, games: 0, directions: { left: 0, center: 0, right: 0 }, sprayHits: [] };
            const b = batters[name];
            b.games++;

            abs.forEach(ab => {
              const lastP = ab[ab.length - 1];
              if (!lastP) return;
              const res = lastP.result;
              b.PA++;
              
              const isHitPlay = ['安', '塁打', '本塁打'].some(w => res.includes(w));
              let isAB = true;
              
              if (isHitPlay) {
                b.H++;
                if (res.includes('二塁打')) b.TB += 2;
                else if (res.includes('三塁打')) b.TB += 3;
                else if (res.includes('本塁打')) b.TB += 4;
                else b.TB += 1;
              } else if (res === '死球' || res === '四球' || res === 'ウエスト') {
                b.BB_HBP++; isAB = false;
              } else if (res.includes('犠打') || res.includes('犠飛')) {
                isAB = false;
              } else {
                let s = 0;
                ab.forEach(p => { if (p.result === 'ストライク' || p.result === '空振り') s++; else if (p.result === 'ファウル' && s < 2) s++; });
                if (res === '三振' || s >= 3) b.K++;
              }
              if (isAB) b.AB++;

              if (isHitPlay || res.includes('ゴロ') || res.includes('飛') || res.includes('直') || res.includes('エラー')) {
                if (res.includes('レフト') || res.includes('サード') || res.includes('ショート') || res.includes('左翼線') || res.includes('三遊間') || res.match(/[左三遊]/)) b.directions.left++;
                else if (res.includes('ライト') || res.includes('ファースト') || res.includes('セカンド') || res.includes('右翼線') || res.includes('一二間') || res.match(/[右一二]/)) b.directions.right++;
                else b.directions.center++;
                
                const sp = getSprayPos(res);
                if (sp) b.sprayHits.push({ ...sp, type: getSprayType(res), result: res });
              }
            });
          });

          // --- 投手集計 ---
          const myPitchingIsTop = isMyTeamTop; // 自チームが先攻の場合、自チーム投手は裏(isTop=false)に投げる
          const validPitPitches = gPitches.filter(p => p.isTop !== myPitchingIsTop && !p.isEvent && p.result !== '牽制' && p.result !== '盗塁死' && p.result !== 'その他出塁');
          
          const pitcherNames = new Set();
          validPitPitches.forEach(p => { if (p.pitcherName) pitcherNames.add(p.pitcherName); });
          
          pitcherNames.forEach(pName => {
            if (!pitcherStats[pName]) pitcherStats[pName] = {
              name: pName, games: 0, total: 0, strikes: 0, calledStrikes: 0, whiffs: 0, swings: 0, inZone: 0,
              firstPitches: 0, firstStrikes: 0, PA: 0, H: 0, K: 0, BB: 0,
              typeStats: {},
              heatmaps: {},
            };
          });

          // 打席単位で集計
          const abArr = [];
          let cAb = [];
          validPitPitches.forEach(p => {
            if (p.pitchNumber === 1 && cAb.length > 0) { abArr.push(cAb); cAb = []; }
            cAb.push(p);
          });
          if (cAb.length > 0) abArr.push(cAb);

          const gameCountedPitchers = new Set();
          abArr.forEach(ab => {
            ab.forEach(p => {
              const pName = p.pitcherName || '不明';
              const st = pitcherStats[pName];
              if (!st) return;
              if (!gameCountedPitchers.has(pName)) { st.games++; gameCountedPitchers.add(pName); }
              st.total++;
              
              const type = p.type ? p.type.replace(/系$/, '') : '不明';
              if (!st.typeStats[type]) st.typeStats[type] = { total: 0, strikes: 0 };
              st.typeStats[type].total++;

              const isStrikeForRate = p.result !== 'ボール' && p.result !== 'ウエスト' && p.result !== '死球';
              if (isStrikeForRate) { st.strikes++; st.typeStats[type].strikes++; }

              let isSwing = false, isStrike = false;
              if (p.result.includes('見逃し') || p.result === 'ストライク') { st.calledStrikes++; isStrike = true; }
              else if (p.result.includes('空振り')) { st.whiffs++; isSwing = true; isStrike = true; }
              else if (p.result === 'ファウル' || p.result === 'インプレー' || ['ゴロ', '飛', '安', '塁打', 'エラー', '犠', '直'].some(w => p.result.includes(w))) { isSwing = true; isStrike = true; }
              if (isSwing) st.swings++;
              if (p.course !== null && isStrikeZoneFn(p.course)) st.inZone++;
              if (p.pitchNumber === 1) { st.firstPitches++; if (isStrike) st.firstStrikes++; }

              if (p.course !== null) {
                if (!st.heatmaps[type]) st.heatmaps[type] = {};
                st.heatmaps[type][p.course] = (st.heatmaps[type][p.course] || 0) + 1;
              }
            });

            const lastP = ab[ab.length - 1];
            if (!lastP) return;
            const pName = lastP.pitcherName || '不明';
            const st = pitcherStats[pName];
            if (!st) return;
            st.PA++;
            const res = lastP.result;
            if (['安', '塁打', '本塁打'].some(w => res.includes(w))) st.H++;
            else if (res === '死球' || res === '四球' || res === 'ウエスト') st.BB++;
            else { let s = 0; ab.forEach(pp => { if (pp.result === 'ストライク' || pp.result === '空振り') s++; else if (pp.result === 'ファウル' && s < 2) s++; }); if (res === '三振' || s >= 3) st.K++; }
          });
        });

        const battersArray = Object.values(batters).filter(b => b.PA > 0).map(b => ({
          ...b,
          AVG: b.AB > 0 ? (b.H / b.AB).toFixed(3).replace(/^0/, '') : '.000',
          OBP: b.PA > 0 ? ((b.H + b.BB_HBP) / b.PA).toFixed(3).replace(/^0/, '') : '.000',
          SLG: b.AB > 0 ? (b.TB / b.AB).toFixed(3).replace(/^0/, '') : '.000',
          OPS: ((b.AB > 0 ? b.H / b.AB : 0) + (b.PA > 0 ? (b.H + b.BB_HBP) / b.PA : 0)).toFixed(3).replace(/^0/, ''),
          KPct: b.PA > 0 ? Math.round((b.K / b.PA) * 100) : 0,
          BBPct: b.PA > 0 ? Math.round((b.BB_HBP / b.PA) * 100) : 0,
        })).sort((a, b) => b.PA - a.PA);

        const pitchersArray = Object.values(pitcherStats).filter(p => p.total > 0).map(st => ({
          ...st,
          strikeRate: st.total > 0 ? Math.round((st.strikes / st.total) * 100) : 0,
          csw: st.total > 0 ? Math.round(((st.calledStrikes + st.whiffs) / st.total) * 100) : 0,
          whiff: st.swings > 0 ? Math.round((st.whiffs / st.swings) * 100) : 0,
          zone: st.total > 0 ? Math.round((st.inZone / st.total) * 100) : 0,
          fStrikePct: st.firstPitches > 0 ? Math.round((st.firstStrikes / st.firstPitches) * 100) : 0,
          pPa: st.PA > 0 ? (st.total / st.PA).toFixed(1) : '0.0',
          typesArray: Object.entries(st.typeStats).map(([t, v]) => ({
            type: t, total: v.total, strikeRate: v.total > 0 ? Math.round((v.strikes / v.total) * 100) : 0,
          })).sort((a, b) => b.total - a.total),
        })).sort((a, b) => b.total - a.total);

        const matchedGames = savedGames.filter(g => {
          const gi = g.data?.gameInfo || { teamTop: g.teamTop, teamBottom: g.teamBottom };
          return gi.teamTop === teamName || gi.teamBottom === teamName;
        }).length;

        return { batters: battersArray, pitchers: pitchersArray, matchedGames };
      }, [showCrossGameStats, myTeam, savedGames]);


      // --- PDF/クリップボード用 ---
      const copyShareText = () => {

        const pitcherStats = {}; 
        const batterStats = { top: {}, bottom: {} }; 
        
        lineups.top.forEach((p, i) => batterStats.top[i+1] = { name: p.name, pos: p.pos, results: [] });
        lineups.bottom.forEach((p, i) => batterStats.bottom[i+1] = { name: p.name, pos: p.pos, results: [] });

        pitches.forEach(p => {
          if (!p.isEvent && p.result !== '牽制' && p.result !== '盗塁死' && p.result !== 'その他出塁' && p.pitcherName) {
            if (!pitcherStats[p.pitcherName]) pitcherStats[p.pitcherName] = { pitches: 0, k: 0, bb: 0, hits: 0 };
            pitcherStats[p.pitcherName].pitches++;
          }
        });

        const abKeys = new Set();
        pitches.forEach(p => abKeys.add(`${p.inning}-${p.isTop}-${p.batter}`));

        abKeys.forEach(key => {
          const parts = key.split('-');
          const inning = parseInt(parts[0]);
          const isTop = parts[1] === 'true';
          const batter = parseInt(parts[2]);

          const abPitches = pitches.filter(p => p.inning === inning && p.isTop === isTop && p.batter === batter && !p.isEvent);
          if (abPitches.length === 0) return;

          const lastPitch = abPitches[abPitches.length - 1];
          const pitcherName = lastPitch.pitcherName || '不明';
          if (!pitcherStats[pitcherName]) pitcherStats[pitcherName] = { pitches: 0, k: 0, bb: 0, hits: 0 };

          let s = 0; let b = 0; let resultStr = '';

          for (let p of abPitches) {
            if (p.result === 'ボール' || p.result === 'ウエスト') b++;
            else if (p.result === 'ストライク' || p.result === '空振り') s++;
            else if (p.result === 'ファウル' && s < 2) s++;
          }

          const isHitPlay = ['安', '塁打', '本塁打'].some(w => lastPitch.result.includes(w));

          if (isHitPlay) {
            resultStr = lastPitch.result;
            pitcherStats[pitcherName].hits++;
          } else if (lastPitch.result === '死球') {
            resultStr = '死球';
            pitcherStats[pitcherName].bb++; 
          } else if (lastPitch.result === 'その他出塁') {
            resultStr = '他出塁';
          } else {
            resultStr = lastPitch.result;
            if (resultStr === '三振') pitcherStats[pitcherName].k++;
            if (resultStr === '四球') pitcherStats[pitcherName].bb++;
          }

          if (resultStr && resultStr !== '牽制' && resultStr !== '盗塁死') {
            const teamKey = isTop ? 'top' : 'bottom';
            if(batterStats[teamKey][batter]) {
                batterStats[teamKey][batter].results.push(resultStr);
            }
          }
        });

        text += `【投手成績】\n`;
        Object.keys(pitcherStats).forEach(pName => {
          const st = pitcherStats[pName];
          text += `${pName}: ${st.pitches}球 / 奪三振${st.k} / 与四死球${st.bb} / 被安打${st.hits}\n`;
        });
        text += `\n`;

        text += `【打席結果: ${gameInfo.teamTop}】\n`;
        Object.keys(batterStats.top).forEach(order => {
          const b = batterStats.top[order];
          const resultsStr = b.results.length > 0 ? b.results.join('、') : '-';
          text += `${order}番(${b.pos}) ${b.name}: ${resultsStr}\n`;
        });
        text += `\n`;

        text += `【打席結果: ${gameInfo.teamBottom}】\n`;
        Object.keys(batterStats.bottom).forEach(order => {
          const b = batterStats.bottom[order];
          const resultsStr = b.results.length > 0 ? b.results.join('、') : '-';
          text += `${order}番(${b.pos}) ${b.name}: ${resultsStr}\n`;
        });
        text += `\n`;

        text += `総数:${analysisData.totalPitches}球 / ストライク率:${analysisData.strikeRate}%`;
        const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); 
        try {
          document.execCommand('copy');
          showToast('結果をコピーしました！クリップボードに保存されました。');
        } catch (err) {
          showToast('コピーに失敗しました。', 'error');
        }
        document.body.removeChild(ta);
      };

      const exportCSV = () => {

        const link = document.createElement("a"); link.setAttribute("href", encodeURI(content)); link.setAttribute("download", `試合データ.csv`); link.click();
      };

        text += `【全プレー履歴（1球ごと・イベントごと）】\n`;
        text += `フォーマット: イニング, 攻撃チーム, 投手, 打者(左右), 投球数, 球種, コース(0-24, 0が左上, 12が真ん中, 24が右下。ストライクゾーンは6-8, 11-13, 16-18), 結果\n`;
        pitches.forEach(p => {

`;
