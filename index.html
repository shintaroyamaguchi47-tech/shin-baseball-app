<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/26be.png">
  <title>配球スコア・分析アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { -webkit-touch-callout: none; overscroll-behavior-y: none; user-select: none; }
    ::-webkit-scrollbar { display: none; }
    .modal-scroll { overflow-y: auto !important; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; touch-action: pan-y; }
    .modal-scroll::-webkit-scrollbar { display: block; width: 4px; }
    .modal-scroll::-webkit-scrollbar-thumb { background-color: #94a3b8; border-radius: 4px; }
    .grid-bg { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
    input:focus, textarea:focus { background-color: white !important; }
    .custom-scrollbar::-webkit-scrollbar { display: block; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 4px; }
    @media print {
      body { background: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
      .no-print { display: none !important; }
      body.printing > #root > div > header,
      body.printing > #root > div > main,
      body.printing > #root > div > .md\:hidden { display: none !important; }
      body.printing .print-target { position: static !important; overflow: visible !important; height: auto !important; min-height: 0 !important; }
      body.printing .print-target > * { overflow: visible !important; height: auto !important; }
      table { font-size: 10px !important; }
      svg { max-width: 100% !important; }
    }

<body class="bg-slate-100 font-sans">
  <div id="root"></div>

  <script>
  try {
  window.generatePdfReport = function(data) {
    var w = window.open('', '_blank');
    if (!w) return false;
    var gi = data.gameInfo, gs = data.gameState, stats = data.advancedStats, ps = data.pitches;
    var topTotal = gs.runs.top.reduce(function(a,b){return a+b;},0);
    var bottomTotal = gs.runs.bottom.reduce(function(a,b){return a+b;},0);
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    
    function heatmapSvg(d, mx, color, label) {
      var GS=7, sz=90, cs=sz/GS;
      var h='<div style="display:inline-block;text-align:center;margin:4px;"><div style="font-size:9px;font-weight:bold;color:'+(color==='red'?'#f87171':color==='indigo'?'#818cf8':'#60a5fa')+';margin-bottom:3px;">'+esc(label)+'</div>';
      h+='<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'" style="background:#1e293b;border:1px solid #334155;border-radius:4px;">';
      h+='<rect x="'+(cs*2)+'" y="'+(cs*2)+'" width="'+(cs*3)+'" height="'+(cs*3)+'" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>';
      for(var i=0;i<GS*GS;i++){var row=Math.floor(i/GS),col=i%GS,v=d[i]||0;if(v>0){var op=mx>0?(v/mx)*0.8:0;var fill=color==='red'?'rgba(239,68,68,'+op+')':color==='indigo'?'rgba(129,140,248,'+op+')':'rgba(96,165,250,'+op+')';h+='<rect x="'+(col*cs)+'" y="'+(row*cs)+'" width="'+cs+'" height="'+cs+'" fill="'+fill+'"/>';h+='<text x="'+(col*cs+cs/2)+'" y="'+(row*cs+cs/2+3)+'" text-anchor="middle" fill="white" font-size="7" font-family="monospace">'+v+'</text>';}}
      h+='</svg></div>';return h;
    }
    
    function sprayChartSvg(hits, label) {
      var HX=120,HY=185;
      var h='<div style="display:inline-block;text-align:center;margin:8px;"><div style="font-size:10px;font-weight:bold;color:#94a3b8;margin-bottom:4px;">'+esc(label)+'</div>';
      h+='<svg width="220" height="187" viewBox="0 0 240 200" style="background:#0f172a;border:1px solid #334155;border-radius:6px;">';
      h+='<path d="M 120 185 L 0 65 L 0 0 L 240 0 L 240 65 Z" fill="#111827"/>';
      h+='<path d="M 120 185 L 8 70 Q 120 -25 232 70 Z" fill="#14532d"/>';
      h+='<path d="M 120 185 L 55 120 Q 120 70 185 120 Z" fill="#78350f" opacity="0.3"/>';
      h+='<path d="M 8 70 Q 120 -25 232 70" fill="none" stroke="#475569" stroke-width="2"/>';
      h+='<line x1="120" y1="185" x2="8" y2="70" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>';
      h+='<line x1="120" y1="185" x2="232" y2="70" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>';
      h+='<polygon points="120,185 80,145 120,110 160,145" fill="none" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="3,2"/>';
      (hits||[]).forEach(function(pt){
        var tx=pt.x+(Math.random()-0.5)*5,ty=pt.y+(Math.random()-0.5)*5;
        var c=pt.type==='hit'?'#60a5fa':pt.type==='error'?'#facc15':pt.type==='foul'?'#c084fc':'#f87171';
        var fl=pt.flight||'fly';
        if(fl==='grounder'){var dx=tx-HX,dy=ty-HY,dist=Math.sqrt(dx*dx+dy*dy),nx=-dy/dist,ny=dx/dist,dd='M '+HX+' '+HY,steps=Math.max(4,Math.round(dist/12));for(var i=1;i<=steps;i++){var t=i/steps,amp=(i%2===0?3:-3)*(1-t*0.5);dd+=' L '+(HX+dx*t+nx*amp)+' '+(HY+dy*t+ny*amp);}h+='<path d="'+dd+'" fill="none" stroke="'+c+'" stroke-width="1.5" opacity="0.75"/>';}
        else if(fl==='liner'){h+='<line x1="'+HX+'" y1="'+HY+'" x2="'+tx+'" y2="'+ty+'" stroke="'+c+'" stroke-width="2" opacity="0.75"/>';}
        else if(fl==='hr'){var mx2=(HX+tx)/2,my2=(HY+ty)/2-15;h+='<path d="M '+HX+' '+HY+' Q '+mx2+' '+my2+' '+tx+' '+ty+'" fill="none" stroke="'+c+'" stroke-width="2.5" opacity="0.75"/>';h+='<circle cx="'+tx+'" cy="'+ty+'" r="5" fill="'+c+'" opacity="0.6"/>';}
        else{var mx2=(HX+tx)/2,my2=(HY+ty)/2-12;h+='<path d="M '+HX+' '+HY+' Q '+mx2+' '+my2+' '+tx+' '+ty+'" fill="none" stroke="'+c+'" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.75"/>';}
        if(fl!=='hr')h+='<circle cx="'+tx+'" cy="'+ty+'" r="3" fill="'+c+'" opacity="0.9"/>';
      });
      if(!hits||hits.length===0)h+='<text x="120" y="100" text-anchor="middle" fill="#475569" font-size="11" font-weight="bold">No Data</text>';
      h+='</svg></div>';return h;
    }
    
    function batterTable(batting, teamName) {
      var h='<h3 style="margin:16px 0 8px;font-size:16px;font-weight:bold;color:#38bdf8;">🏏 打者成績サマリー: '+esc(teamName)+'</h3><table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px;"><thead><tr style="background:#1e293b;color:#94a3b8;"><th style="padding:6px;text-align:left;">順</th><th style="padding:6px;text-align:left;">選手名</th><th style="padding:6px;text-align:right;">打数</th><th style="padding:6px;text-align:right;">安打</th><th style="padding:6px;text-align:right;">四球</th><th style="padding:6px;text-align:right;color:#60a5fa;">打率</th><th style="padding:6px;text-align:right;color:#facc15;">OPS</th><th style="padding:6px;text-align:right;color:#f87171;">K%</th><th style="padding:6px;">打席結果</th></tr></thead><tbody>';
      batting.players.forEach(function(p){h+='<tr style="background:#0f172a;border-bottom:1px solid #334155;"><td style="padding:5px;color:#94a3b8;">'+p.order+'</td><td style="padding:5px;color:white;font-weight:bold;">'+esc(p.name)+' <span style="color:#64748b;font-size:10px;">('+esc(p.pos)+')</span></td><td style="padding:5px;text-align:right;color:#cbd5e1;">'+p.AB+'</td><td style="padding:5px;text-align:right;color:#cbd5e1;">'+p.H+'</td><td style="padding:5px;text-align:right;color:#cbd5e1;">'+p.BB_HBP+'</td><td style="padding:5px;text-align:right;color:#60a5fa;font-weight:bold;">'+p.AVG+'</td><td style="padding:5px;text-align:right;color:#facc15;font-weight:bold;">'+p.OPS+'</td><td style="padding:5px;text-align:right;color:#f87171;">'+p.KPct+'%</td><td style="padding:5px;font-size:10px;color:#94a3b8;">'+(p.results.map(function(r){return esc(r);}).join('、')||'-')+'</td></tr>';});
      h+='</tbody></table>';return h;
    }

    function batterDetails(batting, teamName) {
      var h='<h3 class="pb" style="margin:24px 0 8px;font-size:16px;font-weight:bold;color:#38bdf8;">👤 打者詳細分析 (打球方向): '+esc(teamName)+'</h3><div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;">';
      batting.players.forEach(function(p){
        if(p.PA > 0) {
           h+='<div class="nbi" style="width:calc(50% - 6px);background:#1e293b;border:1px solid #334155;border-radius:8px;padding:12px;box-sizing:border-box;">';
           h+='<div style="font-size:14px;font-weight:bold;color:white;margin-bottom:8px;display:flex;justify-content:space-between;border-bottom:1px solid #334155;padding-bottom:4px;"><span>'+p.order+'番 '+esc(p.name)+'</span><span style="color:#60a5fa;">'+p.AVG+' / OPS:'+p.OPS+'</span></div>';
           h+='<div style="display:flex;gap:12px;align-items:center;">';
           h+=sprayChartSvg(p.sprayHits, '個人の打球方向');
           h+='<div style="flex:1;font-size:10px;color:#cbd5e1;">';
           h+='<div style="margin-bottom:6px;background:#0f172a;padding:6px;border-radius:4px;">打数:'+p.AB+' 安打:'+p.H+'<br>四死:'+p.BB_HBP+' 三振:'+p.K+'</div>';
           h+='<div style="color:#94a3b8;font-size:9px;">結果:<br>'+(p.results.join(', ')||'-')+'</div>';
           h+='</div></div></div>';
        }
      });
      h+='</div>'; return h;
    }

    function countDistHtml(counts, title) {
      var h='<div style="background:#1e293b;border:1px solid #334155;border-radius:8px;padding:8px;min-width:160px;flex:1;"><div style="font-size:10px;font-weight:bold;color:white;text-align:center;margin-bottom:6px;border-bottom:1px solid #334155;padding-bottom:4px;">'+esc(title)+'</div>';
      h+='<div style="display:flex;gap:6px;">';
      ['ahead','even','behind'].forEach(function(cs){
        var label=cs==='ahead'?'有利':cs==='even'?'平行':'不利';
        var d=counts[cs]||{total:0,strikes:0,types:{}};
        var sPct=d.total>0?Math.round((d.strikes/d.total)*100):0;
        h+='<div style="flex:1;background:#0f172a;padding:4px;border-radius:4px;"><div style="font-size:9px;color:#94a3b8;font-weight:bold;text-align:center;margin-bottom:4px;">'+label+' <span style="color:#60a5fa;">S:'+sPct+'%</span></div>';
        if(d.total>0){
            Object.entries(d.types).sort(function(a,b){return b[1]-a[1];}).forEach(function(e){
                var pct=Math.round((e[1]/d.total)*100);
                h+='<div style="display:flex;align-items:center;gap:2px;font-size:7px;margin:2px 0;"><span style="width:36px;color:#cbd5e1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(e[0])+'</span><div style="flex:1;height:4px;background:#334155;border-radius:2px;"><div style="width:'+pct+'%;height:100%;background:#60a5fa;border-radius:2px;"></div></div><span style="width:16px;text-align:right;color:#60a5fa;">'+pct+'%</span></div>';
            });
        }else{h+='<div style="text-align:center;font-size:8px;color:#475569;">-</div>';}
        h+='</div>';
      });
      h+='</div></div>'; return h;
    }

    function pitcherDetails(pitching, teamName) {
      var h='<h3 class="pb" style="margin:24px 0 8px;font-size:16px;font-weight:bold;color:#60a5fa;">⚾ 投手詳細分析: '+esc(teamName)+'</h3>';
      pitching.pitchers.forEach(function(p){
        h+='<div class="nbi" style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:16px;margin-bottom:16px;">';
        h+='<div style="font-size:18px;font-weight:bold;color:white;margin-bottom:12px;border-bottom:1px solid #334155;padding-bottom:4px;">'+esc(p.name)+' <span style="font-size:12px;color:#94a3b8;font-weight:normal;">('+p.total+'球)</span></div>';
        
        h+='<div style="font-size:12px;font-weight:bold;color:#cbd5e1;margin-bottom:6px;">📊 カウント別 配球割合</div>';
        h+='<div style="display:flex;gap:12px;margin-bottom:16px;">';
        h+=countDistHtml(p.counts.vsRight, '対 右打者');
        h+=countDistHtml(p.counts.vsLeft, '対 左打者');
        h+='</div>';

        h+='<div style="font-size:12px;font-weight:bold;color:#cbd5e1;margin-bottom:6px;">🎯 球種別 コース・カウントヒートマップ</div>';
        h+='<div style="display:flex;flex-wrap:wrap;gap:8px;">';
        Object.entries(p.pitchTypeHeatmaps||{}).sort(function(a,b){var ta=0,tb=0;Object.values(a[1].all||{}).forEach(function(v){ta+=v;});Object.values(b[1].all||{}).forEach(function(v){tb+=v;});return tb-ta;}).forEach(function(e){
            var tn=e[0], th=e[1], isFB=tn.indexOf('ストレート')>=0||tn.indexOf('シュート')>=0, clr=isFB?'red':'indigo', cnt=0;
            Object.values(th.all||{}).forEach(function(v){cnt+=v;});
            if(cnt > 0) {
                h+='<div style="background:#1e293b;padding:8px;border-radius:6px;border:1px solid #334155;display:flex;flex-direction:column;align-items:center;">';
                h+='<div style="font-size:11px;font-weight:bold;color:white;margin-bottom:6px;background:#0f172a;padding:2px 8px;border-radius:4px;">'+esc(tn)+' ('+cnt+'球)</div>';
                h+='<div style="display:flex;gap:4px;">';
                h+=heatmapSvg(th.all, th.max.all, clr, '全体');
                h+=heatmapSvg(th.ahead, th.max.ahead, clr, '有利');
                h+=heatmapSvg(th.even, th.max.even, clr, '平行');
                h+=heatmapSvg(th.behind, th.max.behind, clr, '不利');
                h+='</div></div>';
            }
        });
        h+='</div></div>';
      });
      return h;
    }

    var t=stats;
    var summaryH='<h3 style="margin:16px 0 8px;font-size:16px;font-weight:bold;">📋 全体サマリー</h3><table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px;"><tbody>';
    summaryH+='<tr style="background:#1e293b;"><td style="padding:6px;"></td><td style="padding:6px;text-align:center;color:white;font-weight:bold;">'+esc(gi.teamTop)+'</td><td style="padding:6px;text-align:center;color:white;font-weight:bold;">'+esc(gi.teamBottom)+'</td></tr>';
    function sRow(l,a,b){return '<tr style="border-bottom:1px solid #334155;"><td style="padding:6px;color:#94a3b8;width:30%;">'+l+'</td><td style="padding:6px;text-align:center;color:#60a5fa;font-weight:bold;">'+a+'</td><td style="padding:6px;text-align:center;color:#f87171;font-weight:bold;">'+b+'</td></tr>';}
    summaryH+=sRow('打率',t.topBatting.team.AVG,t.bottomBatting.team.AVG);
    summaryH+=sRow('OPS',t.topBatting.team.OPS,t.bottomBatting.team.OPS);
    summaryH+=sRow('K%',t.topBatting.team.KPct+'%',t.bottomBatting.team.KPct+'%');
    summaryH+=sRow('BB%',t.topBatting.team.BBPct+'%',t.bottomBatting.team.BBPct+'%');
    summaryH+='</tbody></table>';

    var sprayH='<h3 style="margin:16px 0 8px;font-size:16px;font-weight:bold;">🎯 チーム打球方向</h3><div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;">';
    sprayH+=sprayChartSvg(t.topBatting.team.sprayHits,gi.teamTop+' ('+t.topBatting.team.sprayHits.length+'打球)');
    sprayH+=sprayChartSvg(t.bottomBatting.team.sprayHits,gi.teamBottom+' ('+t.bottomBatting.team.sprayHits.length+'打球)');
    sprayH+='</div><div style="font-size:8px;color:#64748b;text-align:center;margin-top:4px;">波線=ゴロ / 破線弧=フライ / 直線=ライナー / 太弧+丸=HR | 青=安打 赤=凡打 黄=失策 紫=ファウル</div>';

    var body='<div style="max-width:950px;margin:0 auto;padding:24px;font-family:sans-serif;background:#0f172a;color:#e2e8f0;"><div style="border-bottom:3px solid #3b82f6;padding-bottom:16px;margin-bottom:24px;"><h1 style="font-size:24px;font-weight:900;margin:0 0 8px;">⚾ 試合分析・スコアレポート</h1><div style="display:flex;gap:24px;font-size:14px;"><span>'+esc(gi.date)+'</span><span style="font-weight:bold;">'+esc(gi.teamTop)+' '+topTotal+' - '+bottomTotal+' '+esc(gi.teamBottom)+'</span><span>総投球数: '+ps.filter(function(p){return !p.isEvent;}).length+'球</span></div></div>';
    body+=summaryH+sprayH;
    body+=batterTable(t.topBatting,gi.teamTop) + batterDetails(t.topBatting,gi.teamTop);
    body+=batterTable(t.bottomBatting,gi.teamBottom) + batterDetails(t.bottomBatting,gi.teamBottom);
    body+=pitcherFull(t.pitchingTop,gi.teamTop) + pitcherDetails(t.pitchingTop,gi.teamTop);
    body+=pitcherFull(t.pitchingBottom,gi.teamBottom) + pitcherDetails(t.pitchingBottom,gi.teamBottom);
    body+='</div>';

    w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>試合分析レポート<\/title><style>body{margin:0;background:#0f172a;}@media print{body{background:#0f172a !important;}*{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;} .pb{page-break-before:always;} .nbi{break-inside:avoid;}}table{page-break-inside:auto;}tr{page-break-inside:avoid;}<\/style><\/head><body>'+body+'<\/body><\/html>');
    w.document.close();
    setTimeout(function(){w.print();},500);
    return true;
  };
  } catch(e) { console.error('Pre-script error:', e); }
  </script>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    function App() {
      const [gameState, setGameState] = useState(() => {
        const saved = localStorage.getItem('baseball_gameState');
        const initial = { inning: 1, isTop: true, outs: 0, balls: 0, strikes: 0, batterTop: 1, batterBottom: 1, runners: { first: false, second: false, third: false }, runs: { top: [0,0,0,0,0,0,0,0,0], bottom: [0,0,0,0,0,0,0,0,0] } };
        if (!saved) return initial;
        const parsed = JSON.parse(saved);
        if (parsed.batter && !parsed.batterTop) { parsed.batterTop = parsed.batter; parsed.batterBottom = 1; }
        parsed.batterTop = parsed.batterTop || 1; parsed.batterBottom = parsed.batterBottom || 1;
        parsed.runners = parsed.runners || { first: false, second: false, third: false };
        parsed.runs = parsed.runs || { top: [0,0,0,0,0,0,0,0,0], bottom: [0,0,0,0,0,0,0,0,0] };
        return parsed;
      });

      const [gameInfo, setGameInfo] = useState(() => {
        const saved = localStorage.getItem('baseball_gameInfo');
        return saved ? JSON.parse(saved) : { date: new Date().toISOString().split('T')[0], teamTop: '先攻チーム', teamBottom: '後攻チーム' };
      });

      const [lineups, setLineups] = useState(() => {
        const saved = localStorage.getItem('baseball_lineups');
        if (saved) {
            let parsed = JSON.parse(saved);
            if (parsed.top.length === 9) parsed.top.push({ order: '投', name: '', pos: '投', throws: '右', bats: '右' });
            if (parsed.bottom.length === 9) parsed.bottom.push({ order: '投', name: '', pos: '投', throws: '右', bats: '右' });
            return parsed;
        }
        return {
          top: Array.from({length: 10}, (_,i)=>({ order: i<9 ? i+1 : '投', name: i<9 ? `先攻${i+1}番` : `先発投手`, pos: i===9?'投':'未', throws: '右', bats: '右' })),
          bottom: Array.from({length: 10}, (_,i)=>({ order: i<9 ? i+1 : '投', name: i<9 ? `後攻${i+1}番` : `先発投手`, pos: i===9?'投':'未', throws: '右', bats: '右' }))
        };
      });

      const [pitches, setPitches] = useState(() => {
        const saved = localStorage.getItem('baseball_pitches');
        if (!saved) return [];
        const parsed = JSON.parse(saved);
        return parsed.map(p => {
          if (p.course !== null && p.course !== undefined && p.course < 25) {
            const oldRow = Math.floor(p.course / 5); const oldCol = p.course % 5;
            return { ...p, course: (oldRow + 1) * 7 + (oldCol + 1) };
          }
          return p;
        });
      });

      const [undoStack, setUndoStack] = useState([]);
      const [redoStack, setRedoStack] = useState([]);
      const [savedGames, setSavedGames] = useState(() => { const saved = localStorage.getItem('baseball_savedGames'); return saved ? JSON.parse(saved) : []; });
      const [showArchiveModal, setShowArchiveModal] = useState(false);
      
      const [myTeam, setMyTeam] = useState(() => { const saved = localStorage.getItem('baseball_myTeam'); return saved ? JSON.parse(saved) : null; });

          if (newOuts < 3) {
            if (eventType === 'walk' || eventType === 'other') {
              if (newRunners.first && newRunners.second && newRunners.third) runScored = 1; else if (newRunners.first && newRunners.second) newRunners.third = true; else if (newRunners.first) newRunners.second = true; newRunners.first = true;
            } else if (['single', 'error'].includes(eventType)) {
              if (newRunners.third) runScored++; newRunners.third = newRunners.second; newRunners.second = newRunners.first; newRunners.first = true;
            } else if (eventType === 'double') {
              if (newRunners.third) runScored++; if (newRunners.second) runScored++; newRunners.third = newRunners.first; newRunners.second = true; newRunners.first = false;
            } else if (eventType === 'triple') {

        const currentBatterPitches = pitches.filter(p => p.inning === gameState.inning && p.isTop === gameState.isTop && p.batter === currentBatterIndex + 1 && !p.isEvent);

            const lastPitch = ab[ab.length - 1]; if (!lastPitch) return;
            const bKey = `${lastPitch.batter}-${lastPitch.batterName}`;
            if (!playerStats[bKey]) playerStats[bKey] = { order: lastPitch.batter, name: lastPitch.batterName, pos: '途中', PA:0, AB:0, H:0, TB:0, BB_HBP:0, K:0, results: [], sprayHits: [] };
            const pStat = playerStats[bKey], res = lastPitch.result;
            teamStats.PA++; pStat.PA++;

            let s=0, b=0; ab.forEach(p => { if(['ボール','ウエスト'].includes(p.result)) b++; else if(['ストライク','空振り'].includes(p.result)) s++; else if(p.result==='ファウル'&&s<2) s++; });
            const isHitPlay = ['安','塁打','本塁打'].some(w=>res.includes(w));
            let isAB = true, tbAdded = 0;
            if (isHitPlay) { teamStats.H++; pStat.H++; tbAdded = res.includes('二塁打')?2:res.includes('三塁打')?3:res.includes('本塁打')?4:1; teamStats.TB+=tbAdded; pStat.TB+=tbAdded; }
            else if (['死球','四球','ウエスト'].includes(res)||b>=4) { teamStats.BB_HBP++; pStat.BB_HBP++; isAB = false; }
            else if (['犠打','犠飛'].some(w=>res.includes(w))) { isAB = false; }
            else if (res==='三振'||s>=3) { teamStats.K++; pStat.K++; }
            if (isAB) { teamStats.AB++; pStat.AB++; }

            if (isHitPlay || ['ゴロ','飛','直','エラー'].some(w=>res.includes(w))) {
              const sp = getSprayPosition(res);
              if (sp) {
                const sEnt = { ...sp, type: getSprayResultType(res), flight: getBallFlight(res), result: res };
                teamStats.sprayHits.push(sEnt); pStat.sprayHits.push(sEnt);
              }
            }
            if (!['牽制','盗塁死','その他出塁'].includes(res)) pStat.results.push(res);
          });

          const calcRates = (st) => ({
            AVG: st.AB>0?(st.H/st.AB).toFixed(3).replace(/^0/, ''):'.000',
            OPS: ((st.AB>0?st.H/st.AB:0) + (st.PA>0?(st.H+st.BB_HBP)/st.PA:0)).toFixed(3).replace(/^0/, ''),
            KPct: st.PA>0?Math.round((st.K/st.PA)*100):0, BBPct: st.PA>0?Math.round((st.BB_HBP/st.PA)*100):0
          });
          Object.assign(teamStats, calcRates(teamStats));
          const playersArray = Object.values(playerStats).map(p => ({...p, ...calcRates(p)})).sort((a,b) => a.order - b.order);
          return { team: teamStats, players: playersArray };
        };

        const calcTeamPitching = (isTopQuery) => {
          const vP = pitchesWithCountState.filter(p => p.isTop === isTopQuery && !p.isEvent && !['牽制','盗塁死','その他出塁'].includes(p.result));
          const pStats = {};
          vP.forEach(p => {
              const pName = p.pitcherName || '不明';
              if (!pStats[pName]) pStats[pName] = { 
                  name: pName, total: 0, calledStrikes: 0, whiffs: 0, swings: 0, strikes: 0, firstPitches: 0, firstStrikes: 0, PA: 0, H: 0, K: 0, BB: 0, throws: p.pitcherThrows || '右', typeStats: {}, 
                  heatmaps: { fastball: { all: {}, ahead: {}, even: {}, behind: {}, max: {all:0, ahead:0, even:0, behind:0} }, breaking: { all: {}, ahead: {}, even: {}, behind: {}, max: {all:0, ahead:0, even:0, behind:0} } },
                  pitchTypeHeatmaps: {},
                  counts: { vsRight: { ahead: { total: 0, strikes: 0, types: {} }, even: { total: 0, strikes: 0, types: {} }, behind: { total: 0, strikes: 0, types: {} } }, vsLeft: { ahead: { total: 0, strikes: 0, types: {} }, even: { total: 0, strikes: 0, types: {} }, behind: { total: 0, strikes: 0, types: {} } } }
              };
          });

          const abArr = []; let cAb = [];
          vP.forEach(p => { if (p.pitchNumber === 1 && cAb.length > 0) { abArr.push(cAb); cAb = []; } cAb.push(p); });
          if (cAb.length > 0) abArr.push(cAb);

          abArr.forEach(ab => {
            ab.forEach(p => {
              const st = pStats[p.pitcherName || '不明']; st.total++;
              const type = p.type ? p.type.replace(/系$/, '') : '不明';
              if (!st.typeStats[type]) st.typeStats[type] = { total: 0, calledStrikes: 0, whiffs: 0, swings: 0, strikes: 0 };
              const tSt = st.typeStats[type]; tSt.total++;

              const batterSide = p.batterBats === '左' ? 'vsLeft' : 'vsRight';
              const countState = p.countState || 'even'; 
              const targetCountObj = st.counts[batterSide][countState];
              targetCountObj.total++;
              if (!targetCountObj.types[type]) targetCountObj.types[type] = 0;
              targetCountObj.types[type]++;

              if (!['ボール','ウエスト','死球'].includes(p.result)) { st.strikes++; tSt.strikes++; targetCountObj.strikes++; }

              let isSwing = false, isStrike = false;
              if (p.result.includes('見逃し') || p.result === 'ストライク') { st.calledStrikes++; tSt.calledStrikes++; isStrike = true; }
              else if (p.result.includes('空振り')) { st.whiffs++; tSt.whiffs++; isSwing = true; isStrike = true; }
              else if (['ファウル','インプレー','ゴロ','飛','安','塁打','エラー','犠','直'].some(w => p.result.includes(w))) { isSwing = true; isStrike = true; }
              if (isSwing) { st.swings++; tSt.swings++; }
              if (p.pitchNumber === 1) { st.firstPitches++; if (isStrike) st.firstStrikes++; }

              if (p.course !== null) {
                 const isFast = p.type && (p.type.includes('ストレート') || p.type.includes('シュート'));
                 const typeKey = isFast ? 'fastball' : 'breaking';
                 
                 st.heatmaps[typeKey].all[p.course] = (st.heatmaps[typeKey].all[p.course] || 0) + 1;
                 if (st.heatmaps[typeKey].all[p.course] > st.heatmaps[typeKey].max.all) st.heatmaps[typeKey].max.all = st.heatmaps[typeKey].all[p.course];
                 st.heatmaps[typeKey][countState][p.course] = (st.heatmaps[typeKey][countState][p.course] || 0) + 1;
                 if (st.heatmaps[typeKey][countState][p.course] > st.heatmaps[typeKey].max[countState]) st.heatmaps[typeKey].max[countState] = st.heatmaps[typeKey][countState][p.course];

                 if (!st.pitchTypeHeatmaps[type]) st.pitchTypeHeatmaps[type] = { all: {}, ahead: {}, even: {}, behind: {}, max: {all:0, ahead:0, even:0, behind:0} };
                 const ptH = st.pitchTypeHeatmaps[type]; 
                 ptH.all[p.course] = (ptH.all[p.course] || 0) + 1; if (ptH.all[p.course] > ptH.max.all) ptH.max.all = ptH.all[p.course];
                 ptH[countState][p.course] = (ptH[countState][p.course] || 0) + 1; if (ptH[countState][p.course] > ptH.max[countState]) ptH.max[countState] = ptH[countState][p.course];
              }
            });

            const lastP = ab[ab.length - 1]; if (!lastP) return;
            const st = pStats[lastP.pitcherName || '不明'];
            st.PA++; const res = lastP.result;
            let fB=0, fS=0; ab.forEach(p => { if(['ボール','ウエスト'].includes(p.result)) fB++; else if(['ストライク','空振り'].includes(p.result)) fS++; else if(p.result==='ファウル'&&fS<2) fS++; });
            if (['安','塁打','本塁打'].some(w=>res.includes(w))) st.H++; else if (['死球','四球','ウエスト'].includes(res) || fB>=4) st.BB++; else if (res==='三振' || fS>=3) st.K++;
          });

          return { pitchers: Object.values(pStats).map(st => ({
              ...st, csw: st.total>0?Math.round(((st.calledStrikes+st.whiffs)/st.total)*100):0, whiff: st.swings>0?Math.round((st.whiffs/st.swings)*100):0,
              fStrikePct: st.firstPitches>0?Math.round((st.firstStrikes/st.firstPitches)*100):0, pPa: st.PA>0?(st.total/st.PA).toFixed(1):'0.0',
              types: Object.entries(st.typeStats).map(([t, tSt]) => ({ type: t, total: tSt.total, csw: tSt.total>0?Math.round(((tSt.calledStrikes+tSt.whiffs)/tSt.total)*100):0, whiff: tSt.swings>0?Math.round((tSt.whiffs/tSt.swings)*100):0, strikeRate: tSt.total>0?Math.round((tSt.strikes/tSt.total)*100):0 })).sort((a, b) => b.total - a.total)
            })).sort((a, b) => b.total - a.total)
          };
        };

        return { topBatting: calcBatting(true), bottomBatting: calcBatting(false), pitchingTop: calcTeamPitching(false), pitchingBottom: calcTeamPitching(true) };
      }, [pitchesWithCountState, showPostGameAnalysis, lineups]);

      // --- エクスポート用アクション ---
      const exportCSV = () => {
        const rows = pitches.map(p => [p.inning, p.isTop ? '表' : '裏', p.pitcherName, p.pitcherThrows, p.batterName, p.batterBats, p.pitchNumber, p.type, p.course !== null ? p.course : '', p.result, p.isEvent ? 'イベント' : ''].join(','));
        const link = document.createElement("a"); link.setAttribute("href", encodeURI("data:text/csv;charset=utf-8,\uFEFF" + ["回,表裏,投手,投,打者,打,球数,球種,コース,結果,備考", ...rows].join('\n'))); link.setAttribute("download", `試合データ.csv`); link.click();
      };

      const copyForAI = () => {
        let text = `あなたはプロの野球データアナリストです。以下の試合データを分析し、相手チームの特徴と攻略法を提案してください。\n\n【試合】${gameInfo.date} ${gameInfo.teamTop} ${gameState.runs.top.reduce((a,b)=>a+b,0)} - ${gameState.runs.bottom.reduce((a,b)=>a+b,0)} ${gameInfo.teamBottom}\n\n【全プレー】\n`;
        pitches.forEach(p => text += `${p.inning}回${p.isTop?'表':'裏'}, 投:${p.pitcherName}, 打:${p.batterName}(${p.batterBats}), ${p.pitchNumber}球目, ${p.type||'-'}, コース:${p.course!==null?p.course:'-'}, ${p.result}\n`);
        const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('AI分析用データをコピーしました！');
      };

      const exportData = () => {
        const url = URL.createObjectURL(new Blob([JSON.stringify({ gameState, gameInfo, lineups, pitches })], { type: 'application/json' }));
        const link = document.createElement('a'); link.href = url; link.download = `配球_${gameInfo.date}.json`; document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url); showToast('ファイルを保存しました！', 'success');
      };

      const importData = (event) => {
        const file = event.target.files[0]; if (!file) return; const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (data.gameState && data.lineups && data.pitches) {
              setGameState(data.gameState); setGameInfo(data.gameInfo || { date: new Date().toISOString().split('T')[0], teamTop: '先攻チーム', teamBottom: '後攻チーム' }); setLineups(data.lineups);
              setPitches(data.pitches.map(p => (p.course !== null && p.course < 25) ? { ...p, course: Math.floor(p.course / 5 + 1) * 7 + (p.course % 5 + 1) } : p));
              setUndoStack([]); setRedoStack([]); showToast('データを復元しました！', 'success'); setShowArchiveModal(false); setShowExport(false);
            } else showToast('無効なデータ形式です。', 'error');
          } catch (error) { showToast('読み込みに失敗しました。', 'error'); }
        };
        reader.readAsText(file);
      };

      const copyShareText = () => {
        try {
          const topTotal = gameState.runs.top.reduce((a,b)=>a+b,0), bottomTotal = gameState.runs.bottom.reduce((a,b)=>a+b,0);
          let text = `【結果】${gameInfo.date} ${gameInfo.teamTop} ${topTotal} - ${bottomTotal} ${gameInfo.teamBottom}\n\n`;
          let pStats = {}, bStats = { top: {}, bottom: {} };
          lineups.top.forEach((p, i) => bStats.top[i+1] = { name: p.name, pos: p.pos, res: [] });
          lineups.bottom.forEach((p, i) => bStats.bottom[i+1] = { name: p.name, pos: p.pos, res: [] });

          const abs = {};
          pitches.forEach(p => {
            if (!p.isEvent && !['牽制','盗塁死','その他出塁'].includes(p.result)) {
               const pName = p.pitcherName || '不明';
               if (!pStats[pName]) pStats[pName] = { p: 0, k: 0, bb: 0, h: 0 };
               pStats[pName].p++;
            }
            const key = `${p.inning}-${p.isTop}-${p.batter}`;
            if (!abs[key]) abs[key] = [];
            abs[key].push(p);
          });

          Object.values(abs).forEach(ab => {
            const noEv = ab.filter(p => !p.isEvent);
            if (noEv.length === 0) return;
            const last = noEv[noEv.length-1];
            const pName = last.pitcherName || '不明';
            if (!pStats[pName]) pStats[pName] = { p: 0, k: 0, bb: 0, h: 0 };
            let s=0, b=0; noEv.forEach(p => { if(['ボール','ウエスト'].includes(p.result)) b++; else if(['ストライク','空振り'].includes(p.result)) s++; else if(p.result==='ファウル'&&s<2) s++; });
            const res = last.result;
            let finalRes = res;
            if (['安','塁打','本塁打'].some(w=>res.includes(w))) { pStats[pName].h++; }
            else if (['死球','四球','ウエスト'].includes(res) || b>=4) { pStats[pName].bb++; finalRes = res==='死球'?'死球':'四球'; }
            else if (res==='三振' || s>=3) { pStats[pName].k++; finalRes = '三振'; }
            else if (res==='その他出塁') { finalRes = '他出塁'; }
            
            if (!['牽制','盗塁死'].includes(finalRes)) {
               const tk = last.isTop ? 'top' : 'bottom';
               if(bStats[tk][last.batter]) bStats[tk][last.batter].res.push(finalRes);
            }
          });

          text += `【投手】\n`;
          Object.entries(pStats).forEach(([n, s]) => text += `${n}: ${s.p}球 / 奪三振${s.k} / 与四死${s.bb} / 被安打${s.h}\n`);
          text += `\n【打席: ${gameInfo.teamTop}】\n`;
          Object.entries(bStats.top).forEach(([o, b]) => text += `${o}番(${b.pos}) ${b.name}: ${b.res.length>0?b.res.join('、'):'-'}\n`);
          text += `\n【打席: ${gameInfo.teamBottom}】\n`;
          Object.entries(bStats.bottom).forEach(([o, b]) => text += `${o}番(${b.pos}) ${b.name}: ${b.res.length>0?b.res.join('、'):'-'}\n`);
          
          const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
          showToast('結果をコピーしました！LINE等に貼り付けてください。');
        } catch (e) {
          showToast('コピーに失敗しました', 'error');
        }
      };

      return (
        <div className="min-h-screen bg-slate-100 flex flex-col font-sans text-slate-800 pb-10 text-sm h-screen overflow-hidden">
          
          {toast && <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full font-bold shadow-2xl z-[300] flex items-center gap-3 animate-in slide-in-from-top-4 fade-in duration-200 ${toast.type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-800 text-white'}`}><span>{toast.type === 'error' ? '⚠️' : '✅'}</span>{toast.text}</div>}

          {confirmDialog && (
            <div className="fixed inset-0 bg-black/60 z-[300] flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col p-6 text-center border border-slate-300">
                <h3 className="text-xl font-black text-slate-800 mb-2">{confirmDialog.title}</h3><p className="text-slate-600 font-bold mb-1 whitespace-pre-wrap">{confirmDialog.message}</p>
                {confirmDialog.subMessage && <p className="text-xs text-red-500 font-bold mb-6">{confirmDialog.subMessage}</p>}
                <div className="flex gap-3 mt-4"><button onClick={() => setConfirmDialog(null)} className="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 py-3 rounded-xl font-bold transition-colors">キャンセル</button><button onClick={confirmDialog.onConfirm} className={`flex-1 text-white py-3 rounded-xl font-black shadow-md transition-colors ${confirmDialog.isDanger ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'}`}>実行する</button></div>
              </div>
            </div>
          )}

          <header className="bg-white shadow-sm border-b border-slate-300 p-2 md:p-4 flex flex-col md:flex-row md:items-center md:justify-between shrink-0 gap-2">
            <div className="flex items-center justify-between md:justify-start gap-2">
              <div className="flex items-center gap-1 text-lg md:text-xl font-bold text-blue-700 tracking-tighter">⚾ 配球分析</div>
              <div className="flex md:hidden items-center gap-2 text-xs font-bold"><span className="bg-slate-100 px-2 py-1 rounded border border-slate-300">{gameState.inning}回{gameState.isTop?'表':'裏'}</span><span className="text-slate-800">{gameInfo.teamTop} <span className="text-blue-700 font-black">{gameState.runs.top.reduce((a,b)=>a+b,0)}</span> - <span className="text-blue-700 font-black">{gameState.runs.bottom.reduce((a,b)=>a+b,0)}</span> {gameInfo.teamBottom}</span></div>
              <div className="flex md:hidden gap-1">
                <button onClick={handleNewGame} className="bg-red-50 text-red-600 px-2 py-1 rounded text-[10px] font-bold border border-red-200">🔄</button>
                <button onClick={handleTieBreak} className="bg-purple-50 text-purple-700 px-2 py-1 rounded text-[10px] font-bold border border-purple-200">⚡</button>
                <button onClick={()=>setShowSettings(true)} className="bg-slate-200 px-2 py-1 rounded text-[10px] font-bold border border-slate-300">⚙️</button>
                <button onClick={()=>setShowArchiveModal(true)} className="bg-emerald-600 text-white px-2 py-1 rounded text-[10px] font-bold">📂</button>
                <button onClick={()=>setShowExport(true)} className="bg-blue-600 text-white px-2 py-1 rounded text-[10px] font-bold">📤</button>
                <button onClick={()=>{ setEditingTeamIndex(null); setShowTeamManager(true); }} className="bg-amber-600 text-white px-2 py-1 rounded text-[10px] font-bold">👥</button>
                <button onClick={() => setShowPostGameAnalysis(true)} className="bg-yellow-100 text-yellow-800 px-2 py-1 rounded text-[10px] font-bold border border-yellow-300">🏁</button>
              </div>
            </div>
            
            <div className="hidden md:flex flex-col bg-white border border-slate-400 rounded-lg overflow-hidden text-sm shadow-sm">
              <div className="flex bg-slate-200 border-b border-slate-400 font-bold text-[10px] text-slate-600"><div className="w-24 border-r border-slate-400 flex items-center justify-center py-0.5">TEAM</div>{[1,2,3,4,5,6,7,8,9].map(i => (<div key={i} className={`w-8 border-r border-slate-400 flex items-center justify-center py-0.5 ${gameState.inning === i ? 'bg-blue-300 text-blue-900' : ''}`}>{i}</div>))}<div className="w-10 flex items-center justify-center py-0.5">計</div></div>
              <div className="flex">
                <div className="flex flex-col bg-slate-100 font-bold border-r border-slate-400 w-24">
                  <div className="h-7 border-b border-slate-400 flex items-center"><input type="text" value={gameInfo.teamTop} onChange={e=>setGameInfo({...gameInfo, teamTop: e.target.value})} className="flex-1 h-full bg-transparent text-center outline-none px-1 font-bold text-[11px] min-w-0" /></div>
                  <div className="h-7 flex items-center"><input type="text" value={gameInfo.teamBottom} onChange={e=>setGameInfo({...gameInfo, teamBottom: e.target.value})} className="flex-1 h-full bg-transparent text-center outline-none px-1 font-bold text-[11px] min-w-0" /></div>
                </div>
                <div className="flex">
                  {[1,2,3,4,5,6,7,8,9].map(i => (
                    <div key={i} className={`flex flex-col border-r border-slate-400 text-center w-8 ${gameState.inning === i ? 'bg-blue-50' : 'bg-white'}`}>
                      <div onClick={() => jumpToInning(i, true)} className={`h-7 border-b border-slate-400 flex items-center justify-center font-bold text-[11px] cursor-pointer hover:bg-blue-200 transition-colors ${gameState.inning === i && gameState.isTop ? 'bg-blue-200' : ''}`}>{gameState.runs.top[i-1] > 0 ? gameState.runs.top[i-1] : (gameState.inning > i || (gameState.inning === i && !gameState.isTop) ? '0' : '')}</div>
                      <div onClick={() => jumpToInning(i, false)} className={`h-7 flex items-center justify-center font-bold text-[11px] cursor-pointer hover:bg-blue-200 transition-colors ${gameState.inning === i && !gameState.isTop ? 'bg-blue-200' : ''}`}>{gameState.runs.bottom[i-1] > 0 ? gameState.runs.bottom[i-1] : (gameState.inning > i ? '0' : '')}</div>
                    </div>
                  ))}
                </div>
                <div className="flex flex-col text-center w-10 font-black bg-slate-100 text-blue-800"><div className="h-7 border-b border-slate-400 flex items-center justify-center">{gameState.runs.top.reduce((a,b)=>a+b,0)}</div><div className="h-7 flex items-center justify-center">{gameState.runs.bottom.reduce((a,b)=>a+b,0)}</div></div>
              </div>
            </div>

            <div className="hidden md:flex gap-4 items-center">
              <div className="flex flex-col items-center mr-2">
                <div className="text-[9px] font-bold text-slate-500 mb-0.5 tracking-widest">現在のランナー</div>
                <div className="relative w-8 h-8 mb-1">
                  <button onClick={() => toggleRunner('second')} className={`absolute top-0 left-1/2 -translate-x-1/2 w-3.5 h-3.5 transform rotate-45 border-2 border-slate-400 ${gameState.runners.second ? 'bg-blue-600' : 'bg-white'}`}></button>
                  <button onClick={() => toggleRunner('third')} className={`absolute top-1/2 left-0 -translate-y-1/2 w-3.5 h-3.5 transform rotate-45 border-2 border-slate-400 ${gameState.runners.third ? 'bg-blue-600' : 'bg-white'}`}></button>
                  <button onClick={() => toggleRunner('first')} className={`absolute top-1/2 right-0 -translate-y-1/2 w-3.5 h-3.5 transform rotate-45 border-2 border-slate-400 ${gameState.runners.first ? 'bg-blue-600' : 'bg-white'}`}></button>
                  <div className={`absolute bottom-0 left-1/2 -translate-x-1/2 w-3.5 h-3.5 transform rotate-45 border border-slate-400 bg-slate-200`}></div>
                </div>
                <button onClick={() => setShowAdvanceModal(true)} className="text-[9px] bg-blue-100 hover:bg-blue-200 text-blue-700 px-2 py-0.5 rounded font-bold shadow-sm border border-blue-200">＋進塁</button>

              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col">
                <div className="p-4 border-b border-slate-200 bg-emerald-50 flex justify-between items-center">
                  <h2 className="text-lg font-bold text-emerald-800">📥 データの受信</h2>
                  <button onClick={() => setShowImportTextModal(false)} className="text-slate-400 hover:text-black font-bold text-xl px-2">✕</button>
                </div>
                <div className="p-6 flex flex-col gap-4 bg-slate-50">
                  <p className="text-sm font-bold text-slate-600 text-center">受け取った共有テキストを下に貼り付けてください。</p>
                  <textarea value={importText} onChange={(e) => setImportText(e.target.value)} placeholder="BASEBALL_SHARE:..." className="w-full h-32 p-3 border-2 border-slate-300 rounded-xl text-xs font-mono bg-white focus:border-emerald-500 outline-none" />
                  <div className="flex gap-3">
                    <button onClick={() => setShowImportTextModal(false)} className="flex-1 bg-slate-200 text-slate-700 font-bold py-3 rounded-xl transition-colors">キャンセル</button>
                    <button onClick={handleImportText} className="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-md active:bg-emerald-700 transition-colors">データを復元する</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
