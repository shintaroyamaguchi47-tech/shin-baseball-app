                      <h3 className="text-xl font-bold text-slate-400 mb-4 border-b border-slate-700 pb-2 flex items-center gap-2">
                        <span className="text-slate-500">🎯</span> Pitching Core (基本・応用指標)
                      </h3>
                      <div className="grid grid-cols-2 gap-8 mb-10">
                        {/* 先攻の投手成績 */}
                        <div>
                          <h4 className="text-blue-400 font-bold mb-3">{gameInfo.teamTop} 投手陣</h4>
                          <div className="grid grid-cols-3 gap-3">
                             <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center">
                               <div className="text-slate-400 text-[10px] mb-1">初球ストライク</div>
                               <div className="text-2xl font-black text-white font-mono">{advancedStats.pitchingTop.overall.fStrikePct}%</div>
                             </div>
                             <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center">
                               <div className="text-slate-400 text-[10px] mb-1">1打席球数</div>
                               <div className="text-2xl font-black text-white font-mono">{advancedStats.pitchingTop.overall.pPa}</div>
                             </div>
                             <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center">
                               <div className="text-slate-400 text-[10px] mb-1">CSW%</div>
                               <div className="text-2xl font-black text-yellow-400 font-mono">{advancedStats.pitchingTop.overall.csw}%</div>
                             </div>
                          </div>
                        </div>
                        {/* 後攻の投手成績 */}
                        <div>
                          <h4 className="text-red-400 font-bold mb-3">{gameInfo.teamBottom} 投手陣</h4>
                          <div className="grid grid-cols-3 gap-3">
                             <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center">
                               <div className="text-slate-400 text-[10px] mb-1">初球ストライク</div>
                               <div className="text-2xl font-black text-white font-mono">{advancedStats.pitchingBottom.overall.fStrikePct}%</div>
                             </div>
                             <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center">
                               <div className="text-slate-400 text-[10px] mb-1">1打席球数</div>
                               <div className="text-2xl font-black text-white font-mono">{advancedStats.pitchingBottom.overall.pPa}</div>
                             </div>
                             <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center">
                               <div className="text-slate-400 text-[10px] mb-1">CSW%</div>
                               <div className="text-2xl font-black text-yellow-400 font-mono">{advancedStats.pitchingBottom.overall.csw}%</div>
                             </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* --- タブ: 打者成績（先攻・後攻） --- */}
                  {(postGameTab === 'battingTop' || postGameTab === 'battingBottom') && (
                    <div className="animate-in fade-in slide-in-from-bottom-2 duration-300">
                      <div className="bg-slate-800 rounded-2xl border border-slate-700 shadow-2xl overflow-hidden">
                        <table className="w-full text-left text-sm whitespace-nowrap">
                          <thead className="bg-slate-900 text-slate-400 border-b-2 border-slate-700">
                            <tr>
                              <th className="p-4 font-bold">打順</th>
                              <th className="p-4 font-bold">選手名 <span className="text-xs text-slate-500 font-normal ml-2">※タップで打球方向</span></th>
                              <th className="p-4 font-bold text-right" title="打数">打数</th>
                              <th className="p-4 font-bold text-right" title="安打">安打</th>
                              <th className="p-4 font-bold text-right" title="四死球">四球</th>
                              <th className="p-4 font-bold text-right text-blue-400">打率</th>
                              <th className="p-4 font-bold text-right text-yellow-400">OPS</th>
                              <th className="p-4 font-bold text-right text-red-400" title="三振率">K%</th>
                              <th className="p-4 font-bold text-right text-orange-400" title="初球スイング率">初球Swing%</th>
                              <th className="p-4 font-bold w-1/4">打席結果</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-700/50">
                            {(postGameTab === 'battingTop' ? advancedStats.topBatting.players : advancedStats.bottomBatting.players).map((p, idx) => {
                              const isSub = ['途中', '打', '走', '代'].includes(p.pos);
                              const badgeText = p.pos === '代' ? '途中' : p.pos;
                              const batterKey = `${p.order}-${p.name}`;
                              return (
                              <React.Fragment key={idx}>
                              <tr onClick={() => setExpandedBatter(expandedBatter === batterKey ? null : batterKey)} className={`transition-colors cursor-pointer ${isSub ? 'bg-slate-800/50 hover:bg-slate-700/50' : 'hover:bg-slate-700/50'}`}>
                                <td className="p-4 text-slate-400 font-mono">
                                  <span className="text-blue-400 font-mono w-4 inline-block mr-1">{expandedBatter === batterKey ? '▼' : '▶'}</span>
                                  {isSub ? <span className="text-[10px] bg-slate-700 px-2 py-0.5 rounded text-white">{badgeText}</span> : p.order}
                                </td>
                                <td className="p-4 font-bold text-white">
                                  {p.name} <span className="text-xs text-slate-500 font-normal ml-1">({p.pos})</span>
                                </td>
                                <td className="p-4 text-right font-mono text-slate-300">{p.AB}</td>
                                <td className="p-4 text-right font-mono text-slate-300">{p.H}</td>
                                <td className="p-4 text-right font-mono text-slate-300">{p.BB_HBP}</td>
                                <td className="p-4 text-right font-mono font-bold text-blue-300">{p.AVG}</td>
                                <td className="p-4 text-right font-mono font-bold text-yellow-300">{p.OPS}</td>
                                <td className="p-4 text-right font-mono text-red-300">{p.KPct}%</td>
                                <td className="p-4 text-right font-mono text-orange-300">{p.FirstSwingPct}%</td>
                                <td className="p-4 text-xs text-slate-400 max-w-xs overflow-x-auto custom-scrollbar">
                                  <div className="flex gap-1.5 flex-wrap">
                                    {p.results.map((r, rIdx) => {
                                      const isHit = ['安', '塁打', '本塁打'].some(w => r.includes(w));
                                      const isBB = ['四球', '死球'].some(w => r.includes(w));
                                      return (
                                        <span key={rIdx} className={`px-2 py-0.5 rounded shadow-sm text-[10px] font-bold ${isHit ? 'bg-blue-900/50 text-blue-300 border border-blue-700' : isBB ? 'bg-green-900/50 text-green-300 border border-green-700' : 'bg-slate-700 text-slate-300 border border-slate-600'}`}>
                                          {r}
                                        </span>
                                      )
                                    })}
                                    {p.results.length === 0 && <span className="italic text-slate-600">-</span>}
                                  </div>
                                </td>
                              </tr>
                              {expandedBatter === batterKey && (
                                <tr>
                                  <td colSpan="10" className="p-4 bg-slate-900 border-b-2 border-blue-500/50">
                                    <div className="flex items-start gap-8 justify-center">
                                      <SprayChart hits={p.sprayHits} size={200} title={`${p.name} の打球方向`} />
                                      <div className="flex flex-col gap-3 pt-4 min-w-[160px]">
                                        <div className="text-xs font-bold text-slate-300 border-b border-slate-700 pb-1">方向別集計</div>
                                        {['left', 'center', 'right'].map((dir, dIdx) => {
                                          const val = p.directions[dir];
                                          const total = p.directions.left + p.directions.center + p.directions.right;
                                          const pct = total > 0 ? Math.round((val / total) * 100) : 0;
                                          const labels = ['レフト方向', 'センター方向', 'ライト方向'];
                                          return (
                                            <div key={dir} className="flex items-center gap-2 text-[10px]">
                                              <span className="w-20 text-slate-400 font-bold">{labels[dIdx]}</span>
                                              <div className="flex-1 bg-slate-700 h-2 rounded-full overflow-hidden">
                                                <div className="bg-blue-500 h-full rounded-full" style={{width: `${pct}%`}}></div>
                                              </div>
                                              <span className="w-8 text-right font-mono text-slate-300">{pct}%</span>
                                            </div>
                                          )
                                        })}
                                        <div className="text-[10px] text-slate-500 mt-2">
                                          インプレー合計: {p.directions.left + p.directions.center + p.directions.right}打球
                                        </div>
                                      </div>
                                    </div>
                                  </td>
                                </tr>
                              )}
                              </React.Fragment>
                            )})}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {/* --- タブ: 投手成績 (先攻・後攻) --- */}
                  {(postGameTab === 'pitchingTop' || postGameTab === 'pitchingBottom') && (
                    <div className="animate-in fade-in slide-in-from-bottom-2 duration-300">
                      <div className="bg-slate-800 rounded-2xl border border-slate-700 shadow-2xl overflow-hidden overflow-x-auto">
                        <table className="w-full text-left text-sm whitespace-nowrap min-w-max">
                          <thead className="bg-slate-900 text-slate-400 border-b-2 border-slate-700">
                            <tr>
                              <th className="p-4 font-bold">投手名 <span className="text-xs text-slate-500 font-normal ml-2">※タップで配球詳細</span></th>
                              <th className="p-4 font-bold text-right">投球数</th>
                              <th className="p-4 font-bold text-right">対打者</th>
                              <th className="p-4 font-bold text-right">被安打</th>
                              <th className="p-4 font-bold text-right">奪三振</th>
                              <th className="p-4 font-bold text-right">与四球</th>
                              <th className="p-4 font-bold text-right text-yellow-300">CSW%</th>
                              <th className="p-4 font-bold text-right text-red-300">Whiff%<br/><span className="text-[9px] font-normal text-slate-500">空振り率</span></th>
                              <th className="p-4 font-bold text-right text-green-300">P/PA<br/><span className="text-[9px] font-normal text-slate-500">1打席球数</span></th>
                              <th className="p-4 font-bold text-right text-blue-300">F-Strike%<br/><span className="text-[9px] font-normal text-slate-500">初球ｽﾄﾗｲｸ</span></th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-700/50">
                            {(postGameTab === 'pitchingTop' ? advancedStats.pitchingTop.pitchers : advancedStats.pitchingBottom.pitchers).map(p => (
                              <React.Fragment key={p.name}>
                                <tr onClick={() => setExpandedPitcher(expandedPitcher === p.name ? null : p.name)} className="hover:bg-slate-700/50 transition-colors cursor-pointer">
                                  <td className="p-4 font-bold text-white flex items-center gap-2">
                                    <span className="text-blue-400 font-mono w-4">{expandedPitcher === p.name ? '▼' : '▶'}</span> {p.name} <span className="text-xs text-slate-500 font-normal ml-1">({p.throws}投)</span>
                                  </td>
                                  <td className="p-4 text-right font-mono text-slate-300">{p.total}</td>
                                  <td className="p-4 text-right font-mono text-slate-300">{p.PA}</td>
                                  <td className="p-4 text-right font-mono text-slate-300">{p.H}</td>
                                  <td className="p-4 text-right font-mono text-slate-300">{p.K}</td>
                                  <td className="p-4 text-right font-mono text-slate-300">{p.BB}</td>
                                  <td className="p-4 text-right font-mono font-bold text-yellow-300">{p.csw}%</td>
                                  <td className="p-4 text-right font-mono font-bold text-red-300">{p.whiff}%</td>
                                  <td className="p-4 text-right font-mono font-bold text-green-300">{p.pPa}</td>
                                  <td className="p-4 text-right font-mono font-bold text-blue-300">{p.fStrikePct}%</td>
                                </tr>
                                
                                {/* 展開されるカウント・左右別の配球詳細 */}
                                {expandedPitcher === p.name && (
                                  <tr className="animate-in fade-in slide-in-from-top-2 duration-200">
                                    <td colSpan="10" className="p-6 bg-slate-900 border-b-2 border-blue-500/50 shadow-inner">
                                      <div className="flex flex-col gap-6 max-w-5xl mx-auto">
                                        
                                        {/* 球種別の詳細パフォーマンス表 */}
                                        <div className="bg-slate-800 rounded-lg border border-slate-700 overflow-hidden shadow-md">
                                          <h4 className="text-sm font-bold text-slate-300 p-3 border-b border-slate-700 bg-slate-800/80">⚾ 球種別パフォーマンス</h4>
                                          <table className="w-full text-left text-xs">
                                            <thead className="bg-slate-900/50 text-slate-400">
                                              <tr>
                                                <th className="p-2 font-bold w-1/4 pl-4">球種</th>
                                                <th className="p-2 font-bold text-right">投球数</th>
                                                <th className="p-2 font-bold text-right">割合</th>
                                                <th className="p-2 font-bold text-right text-blue-300">Strike% <span className="text-[9px] text-slate-500 font-normal">ｽﾄﾗｲｸ率</span></th>
                                                <th className="p-2 font-bold text-right text-yellow-400">CSW% <span className="text-[9px] text-slate-500 font-normal">見逃し+空振り</span></th>
                                                <th className="p-2 font-bold text-right text-red-300">Whiff% <span className="text-[9px] text-slate-500 font-normal">空振り/ｽｲﾝｸﾞ</span></th>
                                                <th className="p-2 font-bold text-right text-green-300">Zone% <span className="text-[9px] text-slate-500 font-normal">ｿﾞｰﾝ内率</span></th>
                                              </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-700/50">
                                              {p.types.map(pt => (
                                                <tr key={pt.type} className="hover:bg-slate-700/30 transition-colors">
                                                  <td className="p-2 font-bold text-white pl-4">{pt.type}</td>
                                                  <td className="p-2 text-right font-mono text-slate-300">{pt.total}</td>
                                                  <td className="p-2 text-right font-mono text-slate-400">{Math.round((pt.total / p.total) * 100)}%</td>
                                                  <td className="p-2 text-right font-mono font-bold text-blue-300">{pt.strikeRate}%</td>
                                                  <td className="p-2 text-right font-mono font-bold text-yellow-400">{pt.csw}%</td>
                                                  <td className="p-2 text-right font-mono font-bold text-red-300">{pt.whiff}%</td>
                                                  <td className="p-2 text-right font-mono font-bold text-green-300">{pt.zone}%</td>
                                                </tr>
                                              ))}
                                            </tbody>
                                          </table>
                                        </div>

                                        {/* カウント・左右別の配球傾向 */}
                                        <div className="flex gap-6">
                                          {/* 対右打者 */}
                                          {renderCountStats(p.counts.vsRight, '🆚 対 右打者の配球割合')}
                                          {/* 対左打者 */}
                                          {renderCountStats(p.counts.vsLeft, '🆚 対 左打者の配球割合')}
                                        </div>
                                        
                                        {/* 球種別コースヒートマップ */}
                                        <div className="flex flex-col gap-2 bg-slate-800 p-4 rounded-lg border border-slate-700 items-center justify-center shadow-md">
                                           <div className="flex items-center gap-4 w-full px-4 flex-wrap">
                                              <div className="text-slate-300 font-bold text-xs flex flex-col gap-1">
                                                <span>🎯 コース別配球パターン</span>
                                                <span className="text-[9px] text-slate-500">(捕手目線)</span>
                                              </div>
                                              
                                              <div className="flex bg-slate-700 rounded-md p-1 ml-auto">
                                                <button onClick={() => setPitcherHeatmapCountTab('all')} className={`px-3 py-1 text-[10px] font-bold rounded-sm transition-colors ${pitcherHeatmapCountTab === 'all' ? 'bg-slate-200 text-slate-800 shadow-sm' : 'text-slate-400 hover:text-white'}`}>全ｶｳﾝﾄ</button>
                                                <button onClick={() => setPitcherHeatmapCountTab('ahead')} className={`px-3 py-1 text-[10px] font-bold rounded-sm transition-colors ${pitcherHeatmapCountTab === 'ahead' ? 'bg-slate-200 text-blue-700 shadow-sm' : 'text-slate-400 hover:text-white'}`}>有利(S先行)</button>
                                                <button onClick={() => setPitcherHeatmapCountTab('even')} className={`px-3 py-1 text-[10px] font-bold rounded-sm transition-colors ${pitcherHeatmapCountTab === 'even' ? 'bg-slate-200 text-slate-800 shadow-sm' : 'text-slate-400 hover:text-white'}`}>平行(S=B)</button>
                                                <button onClick={() => setPitcherHeatmapCountTab('behind')} className={`px-3 py-1 text-[10px] font-bold rounded-sm transition-colors ${pitcherHeatmapCountTab === 'behind' ? 'bg-slate-200 text-red-700 shadow-sm' : 'text-slate-400 hover:text-white'}`}>不利(B先行)</button>
                                              </div>
                                           </div>
                                           
                                           {/* 表示モード切替: 直球vs変化球 / 球種個別 */}
                                           <div className="flex bg-slate-700 rounded-md p-1 w-full max-w-md">
                                             <button onClick={() => setPitcherHeatmapTypeTab('split')} className={`flex-1 px-3 py-1 text-[10px] font-bold rounded-sm transition-colors ${pitcherHeatmapTypeTab === 'split' ? 'bg-slate-200 text-slate-800 shadow-sm' : 'text-slate-400 hover:text-white'}`}>直球 vs 変化球</button>
                                             <button onClick={() => setPitcherHeatmapTypeTab('individual')} className={`flex-1 px-3 py-1 text-[10px] font-bold rounded-sm transition-colors ${pitcherHeatmapTypeTab === 'individual' ? 'bg-slate-200 text-indigo-700 shadow-sm' : 'text-slate-400 hover:text-white'}`}>球種個別</button>
                                           </div>

                                           {pitcherHeatmapTypeTab === 'split' ? (
                                           <div className="flex gap-12 mt-2">
                                             <div className="flex flex-col items-center">
                                               <div className="text-[10px] font-bold text-red-400 mb-2 tracking-widest">直球系 (ｽﾄﾚｰﾄ・ｼｭｰﾄ)</div>
                                               <div className="grid grid-cols-5 grid-rows-5 w-28 h-28 gap-px relative bg-slate-700 p-1 rounded border border-slate-600">
                                                 <div className="absolute top-[20%] left-[20%] w-[60%] h-[60%] border-2 border-white/40 pointer-events-none z-10"></div>
                                                 {courses.map(i => {
                                                   const c = p.heatmaps?.fastball[pitcherHeatmapCountTab][i] || 0;
                                                   const max = p.heatmaps?.fastball.max[pitcherHeatmapCountTab] || 0;
                                                   const op = max === 0 ? 0 : c / max;
                                                   return <div key={`fh-${i}`} className="bg-slate-800 relative flex items-center justify-center text-[9px] text-white font-mono">{c > 0 && <div className="absolute inset-0 bg-red-500 transition-opacity" style={{opacity: op*0.8}}></div>}<span className="relative z-20">{c>0?c:''}</span></div>
                                                 })}
                                               </div>
                                             </div>
                                             <div className="flex flex-col items-center">
                                               <div className="text-[10px] font-bold text-blue-400 mb-2 tracking-widest">変化球系 (ｽﾗｲﾀﾞｰ・ｶｰﾌﾞ等)</div>
                                               <div className="grid grid-cols-5 grid-rows-5 w-28 h-28 gap-px relative bg-slate-700 p-1 rounded border border-slate-600">
                                                 <div className="absolute top-[20%] left-[20%] w-[60%] h-[60%] border-2 border-white/40 pointer-events-none z-10"></div>
                                                 {courses.map(i => {
                                                   const c = p.heatmaps?.breaking[pitcherHeatmapCountTab][i] || 0;
                                                   const max = p.heatmaps?.breaking.max[pitcherHeatmapCountTab] || 0;
                                                   const op = max === 0 ? 0 : c / max;
                                                   return <div key={`bh-${i}`} className="bg-slate-800 relative flex items-center justify-center text-[9px] text-white font-mono">{c > 0 && <div className="absolute inset-0 bg-blue-500 transition-opacity" style={{opacity: op*0.8}}></div>}<span className="relative z-20">{c>0?c:''}</span></div>
                                                 })}
                                               </div>
                                             </div>
                                           </div>
                                           ) : (
                                           <div className="flex gap-6 mt-2 flex-wrap justify-center">
                                             {Object.entries(p.pitchTypeHeatmaps || {}).sort(([,a],[,b]) => {
                                               const totalA = Object.values(a.all).reduce((s,v)=>s+v,0);
                                               const totalB = Object.values(b.all).reduce((s,v)=>s+v,0);
                                               return totalB - totalA;
                                             }).map(([typeName, typeHM]) => {
                                               const isFast = typeName.includes('ストレート') || typeName.includes('シュート');
                                               const colorCls = isFast ? 'bg-red-500' : 'bg-indigo-500';
                                               const labelCls = isFast ? 'text-red-400' : 'text-indigo-400';
                                               const totalCount = Object.values(typeHM.all).reduce((s,v)=>s+v,0);
                                               return (
                                                 <div key={typeName} className="flex flex-col items-center">
                                                   <div className={`text-[10px] font-bold ${labelCls} mb-1`}>{typeName} <span className="text-slate-500">({totalCount}球)</span></div>
                                                   <div className="grid grid-cols-5 grid-rows-5 w-24 h-24 gap-px relative bg-slate-700 p-1 rounded border border-slate-600">
                                                     <div className="absolute top-[20%] left-[20%] w-[60%] h-[60%] border-2 border-white/40 pointer-events-none z-10"></div>
                                                     {courses.map(i => {
                                                       const c = typeHM[pitcherHeatmapCountTab][i] || 0;
                                                       const max = typeHM.max[pitcherHeatmapCountTab] || 0;
                                                       const op = max === 0 ? 0 : c / max;
                                                       return <div key={`th-${typeName}-${i}`} className="bg-slate-800 relative flex items-center justify-center text-[8px] text-white font-mono">{c > 0 && <div className={`absolute inset-0 ${colorCls} transition-opacity`} style={{opacity: op*0.8}}></div>}<span className="relative z-20">{c>0?c:''}</span></div>
                                                     })}
                                                   </div>
                                                 </div>
                                               );
                                             })}
                                           </div>
                                           )}
                                        </div>
                                      </div>
                                    </td>
                                  </tr>
                                )}
                              </React.Fragment>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
